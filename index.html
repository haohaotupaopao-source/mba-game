<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBA · 绝望的烤鸡</title>
<style>
:root {
  --bg:#1A0A02;--surface:#2A1406;--card:#3A1A08;--border:#5A2E14;
  --primary:#C85A1A;--gold:#E8A025;--gold-dim:rgba(232,160,37,0.15);
  --text:#FAF0E4;--text-dim:#A07850;--text-muted:#7A5A3A;
  --win:#27AE60;--lose:#C0392B;--warning:#F39C12;
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --shadow:0 2px 8px rgba(0,0,0,0.4);--shadow-lg:0 4px 20px rgba(0,0,0,0.5);
  --shadow-glow:0 0 12px rgba(232,160,37,0.15);
  --font:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --ease:cubic-bezier(0.4,0,0.2,1);--dur:0.25s;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{max-width:520px;margin:0 auto;padding:0 0 72px}
/* HEADER */
.header{background:linear-gradient(135deg,#3A1A08 0%,#1A0A02 100%);padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;backdrop-filter:blur(8px)}
.header-top{display:flex;align-items:center;justify-content:space-between}
.team-name{font-size:18px;font-weight:800;color:var(--primary);display:flex;align-items:center;gap:6px}
.team-name .icon{font-size:22px}
.header-stats{display:flex;gap:12px;font-size:12px;color:var(--text-dim)}
.header-stats .hs{display:flex;align-items:center;gap:4px}
.header-stats .hs .val{color:var(--gold);font-weight:700}
.header-sub{margin-top:8px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-dim)}
.header-sub .phase{padding:3px 10px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:10px}
.header-sub .main-player{color:var(--gold);font-weight:600}
.warning-bar{padding:6px 18px;font-size:11px;font-weight:600;display:none;transition:all var(--dur) var(--ease)}
.warning-bar.yellow{display:block;background:#F39C12;color:#000}
.warning-bar.orange{display:block;background:#E67E22;color:#fff}
.warning-bar.red{display:block;background:#E74C3C;color:#fff}
/* CONTENT */
.content{padding:16px}
.tab-page{display:none}.tab-page.active{display:block;animation:fadeUp .25s var(--ease)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* SECTION TITLES */
.section-title{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-divider{height:1px;background:linear-gradient(90deg,var(--border),transparent);margin-bottom:12px}
/* MORNING CHECK */
.morning-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;transition:box-shadow var(--dur) var(--ease)}
.morning-panel:hover{box-shadow:var(--shadow)}
.morning-toggle{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:14px;font-weight:600;transition:background var(--dur) var(--ease)}
.morning-toggle:active{background:rgba(255,255,255,0.03)}
.morning-toggle .arr{transition:transform var(--dur) var(--ease)}
.morning-toggle.open .arr{transform:rotate(180deg)}
.morning-body{padding:0 16px 16px;display:none}
.morning-body.open{display:block;animation:fadeUp .2s var(--ease)}
.mc-group{margin-bottom:12px}
.mc-label{font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:600}
.mc-options{display:flex;gap:6px;flex-wrap:wrap}
.mc-opt{padding:6px 12px;border-radius:16px;border:1px solid var(--border);font-size:12px;cursor:pointer;transition:all var(--dur) var(--ease);background:var(--surface)}
.mc-opt:active{transform:scale(0.95)}
.mc-opt.selected{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(200,90,26,0.3)}
.mood-row{display:flex;gap:6px}
.mood-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;background:var(--surface);transition:all var(--dur) var(--ease)}
.mood-btn:active{transform:scale(0.9)}
.mood-btn.selected{border-color:var(--gold);background:var(--gold);color:#000;transform:scale(1.1);box-shadow:0 0 10px rgba(232,160,37,0.3)}
/* MORNING REVIEW/PLAN */
.morning-review{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.morning-review .mr-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:14px;font-weight:600}
.morning-review .mr-header .arr{transition:transform var(--dur) var(--ease)}
.morning-review .mr-header.open .arr{transform:rotate(180deg)}
.morning-review .mr-body{padding:0 16px 16px;display:none}
.morning-review .mr-body.open{display:block;animation:fadeUp .2s var(--ease)}
.mr-section-title{font-size:12px;font-weight:700;color:var(--gold);margin:12px 0 8px;display:flex;align-items:center;gap:6px}
.mr-question{font-size:11px;color:var(--text-dim);margin-bottom:4px}
.mr-textarea{width:100%;min-height:48px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:12px;font-family:var(--font);resize:vertical;transition:border-color var(--dur) var(--ease);line-height:1.5}
.mr-textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(200,90,26,0.15)}
.mr-textarea+.mr-question{margin-top:10px}
.mr-done-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;background:rgba(39,174,96,0.15);color:var(--win);font-size:10px;font-weight:600}
/* MATCH PREDICTOR */
.match-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;transition:all var(--dur) var(--ease)}
.match-bar:hover{box-shadow:var(--shadow)}
.match-bar .team{font-size:13px;font-weight:700}
.match-bar .score{font-size:22px;font-weight:800;color:var(--gold)}
.match-bar .result-tag{padding:4px 12px;border-radius:10px;font-size:11px;font-weight:700;transition:all var(--dur) var(--ease)}
.match-bar .result-tag.win{background:rgba(39,174,96,0.2);color:var(--win)}
.match-bar .result-tag.lose{background:rgba(192,57,43,0.2);color:var(--lose)}
.match-bar .result-tag.draw{background:rgba(160,120,80,0.2);color:var(--text-dim)}
.match-bar .result-tag.none{background:rgba(160,120,80,0.2);color:var(--text-dim)}
/* TASK GRID */
.task-grid{display:flex;flex-direction:column;gap:8px}
.task-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all var(--dur) var(--ease);cursor:pointer}
.task-card:active{transform:scale(0.97)}
.task-card:hover{box-shadow:var(--shadow)}
.task-card.main-focus{border-color:var(--gold);box-shadow:var(--shadow-glow)}
.task-card.done{opacity:0.55;border-color:var(--win);animation:taskDone .3s var(--ease)}
@keyframes taskDone{0%{transform:scale(1)}50%{transform:scale(0.95)}100%{transform:scale(1)}}
.task-card.done .tc-check{background:var(--win);border-color:var(--win);color:#fff}
.tc-emoji{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.tc-body{flex:1;min-width:0}
.tc-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.tc-name .badge{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700}
.tc-name .badge.p0{background:#E74C3C;color:#fff}
.tc-name .badge.p1{background:#E67E22;color:#fff}
.tc-name .badge.p2{background:#F1C40F;color:#000}
.tc-name .badge.p3{background:#27AE60;color:#fff}
.tc-dim{font-size:11px;color:var(--text-dim);margin-top:2px}
.tc-task{font-size:12px;color:var(--gold);margin-top:3px}
.tc-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;transition:all var(--dur) var(--ease)}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:20;backdrop-filter:blur(8px)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border:none;background:none;color:var(--text-dim);font-size:10px;cursor:pointer;font-family:var(--font);transition:color var(--dur) var(--ease)}
.nav-btn .ni{font-size:20px;transition:transform var(--dur) var(--ease)}
.nav-btn.active{color:var(--primary)}
.nav-btn.active .ni{transform:scale(1.1)}
/* PLAYERS TAB */
.radar-wrap{display:flex;justify-content:center;margin-bottom:20px}
.player-cards{display:flex;flex-direction:column;gap:8px}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all var(--dur) var(--ease)}
.player-card:hover{box-shadow:var(--shadow)}
.pc-emoji{font-size:28px;width:40px;text-align:center}
.pc-body{flex:1}
.pc-top{display:flex;align-items:center;justify-content:space-between}
.pc-name{font-size:14px;font-weight:700}
.pc-rating{font-size:22px;font-weight:900;color:var(--gold)}
.pc-dim{font-size:11px;color:var(--text-dim)}
.pc-bar{height:6px;background:var(--surface);border-radius:3px;margin-top:6px;overflow:hidden;position:relative}
.pc-bar .fill{height:100%;border-radius:3px;transition:width .6s var(--ease)}
.pc-bar .target-mark{position:absolute;top:-2px;width:2px;height:10px;background:var(--text-dim);border-radius:1px}
.pc-streak{font-size:11px;color:var(--text-dim);margin-top:4px;display:flex;gap:8px}
/* SEASON TAB */
.season-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:all var(--dur) var(--ease)}
.season-card:hover{box-shadow:var(--shadow)}
.season-card .sc-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text-dim)}
.progress-bar{height:10px;background:var(--surface);border-radius:5px;overflow:hidden;margin:8px 0}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:5px;transition:width .6s var(--ease)}
.record-row{display:flex;align-items:center;gap:16px;font-size:14px}
.record-row .big{font-size:28px;font-weight:900;color:var(--gold)}
.recent-games{display:flex;gap:4px;margin-top:8px}
.recent-games .rg{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.recent-games .rg.w{background:rgba(39,174,96,0.2);color:var(--win)}
.recent-games .rg.l{background:rgba(192,57,43,0.2);color:var(--lose)}
/* ACHIEVEMENTS TAB */
.award-section{margin-bottom:20px}
.award-section .as-title{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.award-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.award-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;transition:all var(--dur) var(--ease)}
.award-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.award-card.earned{opacity:1}.award-card.locked{opacity:0.35;filter:grayscale(0.5)}
.award-card.rarity-1.earned{border-color:#aaa}
.award-card.rarity-2.earned{border-color:var(--gold);box-shadow:0 0 8px rgba(232,160,37,0.1)}
.award-card.rarity-3.earned{border-image:linear-gradient(135deg,#ff6b6b,#ffa500,#ffd700,#48dbfb,#ff6b9d) 1}
.award-card.rarity-4.earned{border-image:linear-gradient(135deg,#a8edea,#fed6e3,#d4fc79,#96e6a1,#a8edea) 1;box-shadow:0 0 12px rgba(200,200,255,0.2)}
.award-icon{font-size:28px;margin-bottom:4px}
.award-name{font-size:11px;font-weight:700}
.award-desc{font-size:10px;color:var(--text-dim);margin-top:2px}
/* SETTINGS TAB */
.set-group{margin-bottom:18px}
.set-label{font-size:11px;color:var(--text-dim);font-weight:600;margin-bottom:6px}
.set-input{width:100%;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:var(--font);transition:border-color var(--dur) var(--ease)}
.set-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(200,90,26,0.15)}
.btn{padding:8px 18px;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all var(--dur) var(--ease)}
.btn:active{transform:scale(0.95)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#D96A2A;box-shadow:0 2px 8px rgba(200,90,26,0.3)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-outline:hover{border-color:var(--text-dim)}
.btn-danger{background:transparent;border:1px solid var(--lose);color:var(--lose)}
.btn-danger:hover{background:rgba(192,57,43,0.1)}
/* TOAST */
.toast-box{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--gold);border-radius:10px;padding:10px 18px;font-size:12px;font-weight:600;box-shadow:var(--shadow-lg);animation:toastIn .3s var(--ease),toastOut .3s var(--ease) 2.2s forwards;white-space:nowrap}
.toast.toast-success{border-color:var(--win)}
.toast.toast-warning{border-color:var(--warning)}
.toast.toast-error{border-color:var(--lose)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--surface);border:2px solid var(--gold);border-radius:var(--radius);padding:28px;text-align:center;max-width:340px;width:90%}
.modal h2{font-size:20px;color:var(--gold);margin-bottom:6px}
.modal .big{font-size:48px;margin:12px 0}
</style>
</head>
<body>
<div class="app">
<!-- HEADER -->
<div class="header">
<div class="header-top">
<div class="team-name"><span class="icon">🍗</span>绝望的烤鸡</div>
<div class="header-stats">
<div class="hs">🏀 <span class="val" id="hWins">0</span>-<span id="hLosses">0</span></div>
<div class="hs">🔥 <span class="val" id="hStreak">0</span>天</div>
<div class="hs">🪙 Lv.<span class="val" id="hLevel">1</span></div>
</div>
</div>
<div class="header-sub">
<span class="phase" id="hPhase">常规赛</span>
<span>第<b id="hDay">1</b>/90天</span>
<span>本周主格：<span class="main-player" id="hMain">约基奇</span></span>
</div>
</div>
<div class="warning-bar" id="warningBar"></div>
<!-- CONTENT -->
<div class="content">
<!-- TODAY -->
<div class="tab-page active" id="page-today">
<div class="morning-panel">
<div class="morning-toggle" id="morningToggle" onclick="toggleMorning()">🌅 晨间监控 <span class="arr">▼</span></div>
<div class="morning-body" id="morningBody">
<div class="mc-group"><div class="mc-label">昨晚入睡时间</div><div class="mc-options" id="mcSleep"></div></div>
<div class="mc-group"><div class="mc-label">连续睡眠时长</div><div class="mc-options" id="mcDuration"></div></div>
<div class="mc-group"><div class="mc-label">今日情绪 (1-5)</div><div class="mood-row" id="mcMood"></div></div>
</div>
</div>
<div class="morning-review" id="morningReviewPanel">
<div class="mr-header" id="mrToggle" onclick="toggleMorningReview()">📝 复盘与计划 <span class="arr">▼</span></div>
<div class="mr-body" id="mrBody">
<div class="mr-section-title">🔙 昨日复盘</div>
<div class="mr-question">昨天做对了什么？</div>
<textarea class="mr-textarea" id="mrDidRight" placeholder="值得继续的做法..." onchange="saveMorningReview()"></textarea>
<div class="mr-question">昨天做错了什么？</div>
<textarea class="mr-textarea" id="mrDidWrong" placeholder="需要改进的地方..." onchange="saveMorningReview()"></textarea>
<div class="mr-question">昨天学到了什么？</div>
<textarea class="mr-textarea" id="mrLearned" placeholder="新的认知或发现..." onchange="saveMorningReview()"></textarea>
<div class="mr-question">意外收获</div>
<textarea class="mr-textarea" id="mrSurprise" placeholder="计划外的好事..." onchange="saveMorningReview()"></textarea>
<div class="mr-section-title">📋 今日计划</div>
<div class="mr-question">今天最重要的一件事是什么？</div>
<textarea class="mr-textarea" id="mrMostImportant" placeholder="只能做一件事的话..." onchange="saveMorningReview()"></textarea>
<div class="mr-question">今天哪个球员会变强？怎么变强？</div>
<textarea class="mr-textarea" id="mrPlayerGrow" placeholder="具体的成长行动..." onchange="saveMorningReview()"></textarea>
<div class="mr-question">今天可能遇到什么阻碍？如何应对？</div>
<textarea class="mr-textarea" id="mrObstacle" placeholder="预判阻力，提前准备..." onchange="saveMorningReview()"></textarea>
<div style="margin-top:12px"><button class="btn btn-primary" onclick="saveMorningReview(true)" style="width:100%">💾 保存复盘与计划</button></div>
</div>
</div>
<div class="match-bar" id="matchBar">
<div class="team">DRC <span id="dayTypeLabel" style="font-size:10px;font-weight:400;color:var(--text-dim);margin-left:6px"></span></div>
<div id="matchCenter" style="text-align:center"><span class="score" id="matchScore">0</span>/8</div>
<div style="display:flex;align-items:center;gap:8px"><span id="opponentName" style="font-size:12px;color:var(--text-dim)"></span><div class="result-tag draw" id="matchTag">待开赛</div></div>
</div>
<div class="task-grid" id="taskGrid"></div>
</div>
<!-- PLAYERS -->
<div class="tab-page" id="page-players">
<div class="radar-wrap" id="radarWrap"></div>
<div class="player-cards" id="playerCards"></div>
</div>
<!-- SEASON -->
<div class="tab-page" id="page-season">
<div class="season-card"><div class="sc-title">赛季进度</div><div id="seasonProgress"></div></div>
<div class="season-card"><div class="sc-title">球队战绩</div><div id="seasonRecord"></div></div>
<div class="season-card"><div class="sc-title">本周数据</div><div id="seasonWeek"></div></div>
<div class="season-card"><div class="sc-title" style="display:flex;align-items:center;justify-content:space-between">赛程日历<button onclick="calGoToday()" style="background:var(--gold);border:none;border-radius:6px;padding:3px 8px;color:#000;cursor:pointer;font-size:10px;font-weight:700">今天</button></div><div id="seasonCalendar"></div></div>
<div class="season-card" id="archiveCard" style="display:none"><div class="sc-title">历史赛季</div><div id="seasonArchive"></div></div>
</div>
<!-- ACHIEVEMENTS -->
<div class="tab-page" id="page-achievements"><div id="achieveContent"></div></div>
<!-- SETTINGS -->
<div class="tab-page" id="page-settings">
<div class="set-group"><div class="set-label">赛季开始日期</div><input class="set-input" type="date" id="setStart"></div>
<div class="set-group"><div class="set-label">球员每日任务编辑</div><div id="setTasks"></div></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">
<button class="btn btn-primary" onclick="saveSettings()">💾 保存</button>
<button class="btn btn-outline" onclick="exportData()">📤 导出</button>
<button class="btn btn-outline" onclick="importData()">📥 导入</button>
<button class="btn btn-danger" onclick="resetGame()">⚠️ 重置</button>
</div>
<div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
<div class="set-label" style="margin-bottom:10px">📱 跨设备同步</div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button class="btn btn-primary" onclick="syncExport()">生成同步码</button>
<button class="btn btn-outline" onclick="syncImportPrompt()">输入同步码</button>
</div>
<div id="syncQrArea" style="margin-top:12px;display:none"></div>
</div>
</div>
</div>
</div>
<!-- BOTTOM NAV -->
<div class="bottom-nav">

function dateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function beijingNow(){
  const now=new Date();
  return new Date(now.getTime()+(8*3600000)+(now.getTimezoneOffset()*60000));
}
function today(){
  const bj=beijingNow();
  // Day boundary at 6am Beijing time — before 6am counts as previous day
  if(bj.getHours()<6) bj.setDate(bj.getDate()-1);
  return dateStr(bj);
}
function calcInitialOrdinal(){
  const bj=beijingNow();
  const month=bj.getMonth(); // 0-11
  const year=bj.getFullYear();
  // Q3=7-9月(idx0), Q4=10-12月(idx1), Q1=1-3月(idx2), Q2=4-6月(idx3)
  let si;
  if(month>=6&&month<=8)si=0;      // Jul-Sep = Q3
  else if(month>=9&&month<=11)si=1; // Oct-Dec = Q4
  else if(month>=0&&month<=2)si=2;  // Jan-Mar = Q1
  else si=3;                        // Apr-Jun = Q2
  // For Q1/Q2, the "year" is the next year relative to Q3 start
  const baseYear=(month<=2)?(year-1):((month<=5)?(year-1):year);
  return(baseYear-2025)*4+si;
}
// Season start date: the 1st day of the quarter
function calcSeasonStartDate(ordinal){
  const ord=ordinal||0;
  const baseYear=2025+Math.floor(ord/4);
  const qi=ord%4; // 0=Q3, 1=Q4, 2=Q1, 3=Q2
  // Q3: Jul 1, Q4: Oct 1, Q1: Jan 1 (next year), Q2: Apr 1 (next year)
  if(qi===0)return`${baseYear}-07-01`;
  if(qi===1)return`${baseYear}-10-01`;
  if(qi===2)return`${baseYear+1}-01-01`;
  return`${baseYear+1}-04-01`;
}
function seasonLabel(ordParam){
  const ord=(ordParam!==undefined)?ordParam:(G.seasonOrdinal||0);
  const baseYear=2025+Math.floor(ord/4);
  const qi=ord%4;
  if(qi===0)return`${baseYear}Q3`;
  if(qi===1)return`${baseYear}Q4`;
  if(qi===2)return`${baseYear+1}Q1`;
  return`${baseYear+1}Q2`;
}

// Seeded PRNG for deterministic schedule per season
function seededRng(seed){
  let s=seed;
  return function(){s=(s*1664525+1013904223)&0xFFFFFFFF;return(s>>>0)/0xFFFFFFFF;};
}

// Generate game day set for a season (randomized but deterministic per ordinal)
// Regular season: 35 games in 70 days (days 6-75)
// Playoffs: 8 games in 12 days (days 76-87)
// Pattern: mostly alternating, some 2-day streaks, rare 3-day streaks
function generateGameDays(ordinal){
  const rng=seededRng((ordinal||0)*31337+42);
  const gameDays=new Set();
  // Regular season: 35 games in days 1-75
  let day=1;
  let gamesPlaced=0;
  while(gamesPlaced<35&&day<=75){
    gameDays.add(day);gamesPlaced++;
    if(gamesPlaced>=35)break;
    // Decide gap pattern
    const roll=rng();
    if(roll<0.35&&day+1<=75&&gamesPlaced<35){
      // 35%: consecutive 2 games (add tomorrow too)
      day++;gameDays.add(day);gamesPlaced++;
      if(gamesPlaced>=35)break;
      // After 2 consecutive, rest 1-2 days
      day+=rng()<0.5?2:3;
    }else if(roll<0.45&&day+2<=75&&gamesPlaced+1<35){
      // 10%: consecutive 3 games
      day++;gameDays.add(day);gamesPlaced++;
      if(gamesPlaced>=35)break;
      day++;gameDays.add(day);gamesPlaced++;
      if(gamesPlaced>=35)break;
      // After 3 consecutive, rest 2-3 days
      day+=rng()<0.5?3:4;
    }else{
      // 55%: single game then rest 1-2 days
      day+=rng()<0.6?2:3;
    }
  }
  // If we didn't place enough (unlikely), fill remaining slots
  if(gamesPlaced<35){
    for(let d=1;d<=75&&gamesPlaced<35;d++){
      if(!gameDays.has(d)){gameDays.add(d);gamesPlaced++;}
    }
  }
  // Playoffs: 8 games in days 76-87 (deterministic random pattern)
  let pDay=76;let pGames=0;
  while(pGames<8&&pDay<=87){
    gameDays.add(pDay);pGames++;
    if(pGames>=8)break;
    const pr=rng();
    if(pr<0.4&&pDay+1<=87&&pGames<8){
      pDay++;gameDays.add(pDay);pGames++;
      if(pGames>=8)break;
      pDay+=2;
    }else{
      pDay+=rng()<0.5?1:2;
    }
  }
  if(pGames<8){for(let d=76;d<=87&&pGames<8;d++){if(!gameDays.has(d)){gameDays.add(d);pGames++;}}}
  return gameDays;
}

// Cache game days for current season
let _gameDayCache=null;let _gameDayCacheOrd=null;
function getGameDays(){
  const ord=G.seasonOrdinal||0;
  if(_gameDayCache&&_gameDayCacheOrd===ord)return _gameDayCache;
  _gameDayCache=generateGameDays(ord);
  _gameDayCacheOrd=ord;
  return _gameDayCache;
}

function isGameDay(d){
  if(!d)d=seasonDay();
  if(d>87)return false; // settlement: no games
  return getGameDays().has(d);
}
function todayLabel(){
  const d=seasonDay();
  if(d<=75)return isGameDay(d)?'常规赛·比赛日':'常规赛·训练日';
  if(d<=87)return'季后赛·比赛日';
  return'赛季结算';
}

// Generate season schedule: assigns opponents to each game day
function buildSchedule(ordinal){
  const offset=(ordinal||0)*7%OPPONENTS.length;
  const opps=[...OPPONENTS.slice(offset),...OPPONENTS.slice(0,offset)];
  const gameDays=generateGameDays(ordinal);
  const sorted=[...gameDays].sort((a,b)=>a-b);
  const schedule=[];
  sorted.forEach((d,i)=>{
    const opp=opps[i%opps.length];
    const home=i%2===0;
    let phaseLabel='常规赛';
    if(d<=5)phaseLabel='季前赛';
    else if(d>75)phaseLabel='季后赛';
    schedule.push({day:d,opponent:opp,home,gameNo:i+1,phase:phaseLabel});
  });
  return schedule;
}

// Get today's fixture (if game day)
function todayFixture(){
  const d=seasonDay();
  if(!isGameDay(d))return null;
  const sched=buildSchedule(G.seasonOrdinal||0);
  return sched.find(f=>f.day===d)||null;
}

// Get next upcoming game
function nextFixture(){
  const d=seasonDay();
  const sched=buildSchedule(G.seasonOrdinal||0);
  return sched.find(f=>f.day>=d)||null;
}

// Season archive: save current season stats and start fresh
function archiveSeason(){
  if(!G.archive)G.archive=[];
  const name=seasonLabel();
  // Only archive if the season was actually played (has days logged)
  if(G.totalDays>0||G.wins>0||G.losses>0){
    // find top growth player
    let topPlayer='',topGrowth=0;
    PLAYERS.forEach(p=>{
      const growth=G.players[p.id].rating-p.initRating;
      if(growth>topGrowth){topGrowth=growth;topPlayer=p.name;}
    });
    G.archive.push({
      season:name,
      wins:G.wins,losses:G.losses,
      totalDays:G.totalDays,
      awards:[...G.awards],
      topPlayer,topGrowth,
      ratings:Object.fromEntries(PLAYERS.map(p=>[p.id,G.players[p.id].rating])),
      history:G.history?[...G.history]:[]
    });
  }
  // Start new season — keep ratings and archive, reset everything else
  G.seasonOrdinal=(G.seasonOrdinal||0)+1;
  G.seasonStart=calcSeasonStartDate(G.seasonOrdinal);
  _gameDayCache=null;_gameDayCacheOrd=null;
  G.wins=0;G.losses=0;G.recentGames=[];
  G.totalDays=0;G.history=[];
  G.activeStreak=0;G.weeklyMain={};
  G.awards=[];
  G.dailyCompleted={};
  G.morningCheck={sleepTime:'',sleepDuration:'',mood:0};
  G.today=today();
  // Reset streaks but keep ratings
  PLAYERS.forEach(p=>{G.players[p.id].streak=0;G.players[p.id].missStreak=0;});
  save();
  toast('🏆 赛季归档完成！新赛季开始');
}

// Priority weights: P0 is critical, P3 is supporting
const PRIORITY_WEIGHT={P0:4,P1:3,P2:2,P3:1.5};

// Weighted match score: considers priority + OVR
function calcMatchScore(completed){
  let score=0, maxScore=0;
  PLAYERS.forEach(p=>{
    const ps=G.players[p.id];
    const pw=PRIORITY_WEIGHT[p.priority];
    const ovrMul=ps.rating/70; // OVR 70=1.0x, 55=0.79x, 92=1.31x
    const impact=pw*ovrMul;
    maxScore+=impact;
    if(completed[p.id]){
      score+=impact;
    }else{
      // P0/P1 not done = penalty (makes it harder to win)
      if(p.priority==='P0')score-=impact*0.5;
      else if(p.priority==='P1')score-=impact*0.3;
    }
  });
  return{score,maxScore,pct:maxScore>0?score/maxScore:0};
}

function matchResult(completed){
  const{score,maxScore,pct}=calcMatchScore(completed);
  const diff=Math.round(score-maxScore*0.45); // net differential vs 45% threshold
  if(pct>=0.85)return{tag:'大胜',cls:'win',pts:diff,pct};
  if(pct>=0.65)return{tag:'小胜',cls:'win',pts:diff,pct};
  if(pct>=0.45)return{tag:'险胜',cls:'win',pts:diff,pct};
  if(pct>=0.25)return{tag:'小负',cls:'lose',pts:diff,pct};
  return{tag:'大负',cls:'lose',pts:diff,pct};
}

function dailyReset(){
  if(G.today===today())return;
  // settle yesterday
  const yComp=G.dailyCompleted;
  const yCount=Object.values(yComp).filter(Boolean).length;
  const yDay=seasonDay()-1; // yesterday's season day (approx)
  if(G.totalDays>0||yCount>0){
    // streaks always update regardless of game day
    PLAYERS.forEach(p=>{
      const ps=G.players[p.id];
      if(yComp[p.id]){
        ps.streak++;ps.missStreak=0;
        if(ps.streak===3)ps.rating=Math.min(99,ps.rating+1);
        if(ps.streak===7)ps.rating=Math.min(99,ps.rating+4);
        if(ps.streak>7&&ps.streak%7===0)ps.rating=Math.min(99,ps.rating+5);
      }else{
        ps.missStreak++;ps.streak=0;
        if(ps.missStreak===3)ps.rating=Math.max(40,ps.rating-1);
        if(ps.missStreak===7)ps.rating=Math.max(40,ps.rating-3);
        if(ps.missStreak>7&&ps.missStreak%7===0)ps.rating=Math.max(40,ps.rating-3);
      }
    });
    // Only settle W/L on game days
    if(isGameDay(yDay)){
      const mr=matchResult(yComp);
      if(mr.cls==='win'){G.wins++}else{G.losses++}
      G.recentGames.push(mr.cls==='lose'?'L':'W');
      if(G.recentGames.length>10)G.recentGames.shift();
      // find fixture for that day
      const sched=buildSchedule(G.seasonOrdinal||0);
      const fix=sched.find(f=>f.day===yDay);
      G.history.push({date:G.today,completed:yCount,result:mr.tag,pct:mr.pct,isGame:true,opponent:fix?fix.opponent.name:null});
    }else{
      G.history.push({date:G.today,completed:yCount,result:'训练',isGame:false});
    }
    if(G.history.length>90)G.history.shift();
    // track weekly main player completion
    if(!G.weeklyMain)G.weeklyMain={};
    const weekMainId=WEEK_ORDER[Math.floor((seasonDay()-2)/7)%8];
    if(yComp[weekMainId]){
      G.weeklyMain[weekMainId]=(G.weeklyMain[weekMainId]||0)+1;
      if(G.weeklyMain[weekMainId]>=7&&!G.awards.includes('week_best')){
        G.awards.push('week_best');toast('🏅 周最佳球员！');
      }
    }
    if(yCount>=4){G.activeStreak++}else{G.activeStreak=0}
  }
  G.totalDays++;
  G.today=today();
  checkAwards(yComp); // check awards with YESTERDAY's completions before clearing
  G.dailyCompleted={};
  G.morningCheck={sleepTime:'',sleepDuration:'',mood:0};
  G.morningReview={didRight:'',didWrong:'',learned:'',surprise:'',mostImportant:'',playerGrow:'',obstacle:'',saved:false};
  // Check if season ended (day > 90)
  while(rawSeasonDay()>90){archiveSeason();}
  save();
}

function toggleTask(pid){
  const wasDone=G.dailyCompleted[pid];
  G.dailyCompleted[pid]=!wasDone;
  if(!wasDone){G.totalTasksDone++;toast('✓ '+PLAYERS.find(p=>p.id===pid).name+' 完成','success');}else{G.totalTasksDone=Math.max(0,G.totalTasksDone-1);}
  // Awards are NOT checked here — only at daily reset (6am settlement)
  save();renderAll();
}

function checkAwards(yesterdayComp){
  const earned=G.awards;
  const comp=yesterdayComp||G.dailyCompleted;
  const c=Object.values(comp).filter(Boolean).length;
  const dims=new Set(PLAYERS.filter(p=>comp[p.id]).map(p=>p.dim));
  if(dims.size>=3&&!earned.includes('triple')){earned.push('triple');toast('🏅 三双王！')}
  if(dims.size>=5&&!earned.includes('penta')){earned.push('penta');toast('🏅 五双奇迹！')}
  PLAYERS.forEach(p=>{
    const ps=G.players[p.id];
    if(ps.rating>=p.initRating+10&&!earned.includes('rookie')){earned.push('rookie');toast('🌱 最佳新秀！')}

function getWarning(){
  let maxMiss=0,p0p1Miss=0;
  PLAYERS.forEach(p=>{
    const ps=G.players[p.id];
    maxMiss=Math.max(maxMiss,ps.missStreak);
    if((p.priority==='P0'||p.priority==='P1')&&ps.missStreak>=14)p0p1Miss++;
  });
  if(p0p1Miss>=2)return'red';
  if(maxMiss>=14)return'orange';
  if(maxMiss>=3)return'yellow';
  return'';
}

function buildRadar(){
  const cx=130,cy=130,r=90,n=8;
  const step=Math.PI*2/n;
  let svg='<svg viewBox="0 0 260 260" width="100%" style="max-width:280px">';
  // rings
  [40,55,70,85,99].forEach(v=>{
    const nr=(v-40)/(99-40);
    let pts=[];
    for(let i=0;i<n;i++){const a=-Math.PI/2+i*step;pts.push(`${cx+r*nr*Math.cos(a)},${cy+r*nr*Math.sin(a)}`);}
    svg+=`<polygon points="${pts.join(' ')}" fill="none" stroke="rgba(250,240,228,0.08)" stroke-width="0.5"/>`;
  });
  // axes + labels
  PLAYERS.forEach((p,i)=>{
    const a=-Math.PI/2+i*step;
    svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="rgba(250,240,228,0.12)" stroke-width="0.5"/>`;
    const lx=cx+(r+18)*Math.cos(a),ly=cy+(r+18)*Math.sin(a);
    svg+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="#A07850" font-size="9">${p.name}</text>`;
    const vx=cx+(r+30)*Math.cos(a),vy=cy+(r+30)*Math.sin(a);
    svg+=`<text x="${vx}" y="${vy}" text-anchor="middle" dominant-baseline="middle" fill="#E8A025" font-size="8" font-weight="bold">${G.players[p.id].rating}</text>`;
  });
  // target polygon
  let tPts=PLAYERS.map((p,i)=>{const a=-Math.PI/2+i*step;const nr=(p.target-40)/(99-40);return`${cx+r*nr*Math.cos(a)},${cy+r*nr*Math.sin(a)}`;}).join(' ');
  svg+=`<polygon points="${tPts}" fill="none" stroke="rgba(200,90,26,0.3)" stroke-width="1" stroke-dasharray="3,3"/>`;
  // current polygon
  let cPts=PLAYERS.map((p,i)=>{const a=-Math.PI/2+i*step;const nr=(G.players[p.id].rating-40)/(99-40);return`${cx+r*nr*Math.cos(a)},${cy+r*nr*Math.sin(a)}`;}).join(' ');
  svg+=`<polygon points="${cPts}" fill="rgba(232,160,37,0.25)" stroke="#E8A025" stroke-width="2"/>`;
  // dots
  PLAYERS.forEach((p,i)=>{const a=-Math.PI/2+i*step;const nr=(G.players[p.id].rating-40)/(99-40);svg+=`<circle cx="${cx+r*nr*Math.cos(a)}" cy="${cy+r*nr*Math.sin(a)}" r="3" fill="${p.color}"/>`;});
  svg+='</svg>';return svg;
}

let _calViewMonth=null; // current viewing month offset (0=season start month)
let _calViewOrdinal=null; // which season's calendar we're viewing

function initCalView(){
  // Default: show the month that contains today (real date, not game-day)
  const ord=G.seasonOrdinal||0;
  _calViewOrdinal=ord;
  const start=new Date(calcSeasonStartDate(ord)+'T00:00:00');
  const realToday=beijingNow();
  _calViewMonth=realToday.getMonth()-start.getMonth()+(realToday.getFullYear()-start.getFullYear())*12;
  if(_calViewMonth<0)_calViewMonth=0;
}

function calMonthRange(ord,monthOffset){
  const start=new Date(calcSeasonStartDate(ord)+'T00:00:00');
  const viewDate=new Date(start.getFullYear(),start.getMonth()+monthOffset,1);
  const year=viewDate.getFullYear();
  const month=viewDate.getMonth();
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  return{year,month,firstDay,lastDay,daysInMonth:lastDay.getDate()};
}

function getHistoryForDate(dateStr){
  if(!G.history)return null;
  return G.history.find(h=>h.date===dateStr)||null;
}

function getArchivedHistoryForDate(dateStr,ordinal){
  // Check archived seasons
  if(!G.archive)return null;
  for(let i=0;i<G.archive.length;i++){
    const a=G.archive[i];
    if(a.history){
      const h=a.history.find(x=>x.date===dateStr);
      if(h)return h;
    }
  }
  return null;
}

function renderCalendar(){
  if(_calViewOrdinal===null)initCalView();
  const viewOrd=_calViewOrdinal;
  const seasonStart=calcSeasonStartDate(viewOrd);
  const seasonStartD=new Date(seasonStart+'T00:00:00');
  const sched=buildSchedule(viewOrd);
  const viewGameDays=generateGameDays(viewOrd);
  const curDay=seasonDay();
  const todayStr=today(); // game-day for history lookup
  const realTodayStr=dateStr(beijingNow()); // real date for highlight
  const isCurrentSeason=(viewOrd===(G.seasonOrdinal||0));

  const{year,month,firstDay,lastDay,daysInMonth}=calMonthRange(viewOrd,_calViewMonth);
  const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const dayNames=['一','二','三','四','五','六','日'];

  // Navigation header
  let html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  html+=`<button onclick="calNav(-1)" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);cursor:pointer;font-size:14px">◀</button>`;
  html+=`<div style="text-align:center"><span style="font-weight:800;font-size:15px">${year}年${monthNames[month]}</span>`;
  html+=`<span style="font-size:11px;color:var(--text-dim);margin-left:8px">${seasonLabel(viewOrd)}</span></div>`;
  html+=`<button onclick="calNav(1)" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);cursor:pointer;font-size:14px">▶</button>`;
  html+='</div>';

  // Season switcher
  html+='<div style="display:flex;gap:6px;margin-bottom:10px;justify-content:center;flex-wrap:wrap">';
  const prevOrd=viewOrd-1;const nextOrd=viewOrd+1;
  if(prevOrd>=0){
    html+=`<button onclick="calSwitchSeason(${prevOrd})" style="font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:${viewOrd===prevOrd?'var(--primary)':'var(--surface)'};color:var(--text);cursor:pointer">${seasonLabel(prevOrd)}</button>`;
  }
  html+=`<button onclick="calSwitchSeason(${viewOrd})" style="font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--primary);color:var(--text);cursor:pointer;font-weight:700">${seasonLabel(viewOrd)}</button>`;
  html+=`<button onclick="calSwitchSeason(${nextOrd})" style="font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:${viewOrd===nextOrd?'var(--primary)':'var(--surface)'};color:var(--text);cursor:pointer">${seasonLabel(nextOrd)}</button>`;
  html+='</div>';

  // Weekday header
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">';
  dayNames.forEach(dn=>{
    html+=`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text-dim);padding:4px 0">${dn}</div>`;
  });
  html+='</div>';

  // Calendar grid
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
  // Blank cells for days before month starts (Monday=0)
  let startWeekday=(firstDay.getDay()+6)%7; // convert Sun=0 to Mon=0
  for(let i=0;i<startWeekday;i++){
    html+='<div style="min-height:52px"></div>';
  }

  for(let day=1;day<=daysInMonth;day++){
    const cellDate=new Date(year,month,day);
    const cellDateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    // Calculate season day for this date
    const diffMs=cellDate-seasonStartD;
    const sDay=Math.floor(diffMs/(864e5))+1;
    const inSeason=(sDay>=1&&sDay<=90);
    const isToday=(cellDateStr===realTodayStr&&isCurrentSeason);
    const isPast=cellDateStr<todayStr;
    const isGame=inSeason&&viewGameDays.has(sDay);
    const isPlayoff=inSeason&&sDay>75&&sDay<=87;
    const fix=isGame?sched.find(f=>f.day===sDay):null;

    // Get result from history
    let resultTag='';
    let resultColor='';
    if(isPast&&inSeason){
      let hist=null;
      if(isCurrentSeason){
        hist=getHistoryForDate(cellDateStr);
      }else{
        hist=getArchivedHistoryForDate(cellDateStr,viewOrd);
      }
      if(hist){
        if(hist.isGame){
          if(hist.result==='大胜'){resultTag='大胜';resultColor='#6ecb89';}
          else if(hist.result==='小胜'){resultTag='小胜';resultColor='#6ecb89';}
          else if(hist.result==='险胜'){resultTag='险胜';resultColor='#81c784';}
          else if(hist.result==='小负'){resultTag='小负';resultColor='#ef6f61';}
          else{resultTag='大负';resultColor='#ef6f61';}
        }else{
          // Training day: check completion
          if(hist.completed>=6){resultTag='高效';resultColor='#6ecb89';}
          else if(hist.completed>=3){resultTag='轻训';resultColor='#f0b84e';}
          else if(hist.completed>=1){resultTag='低效';resultColor='#ef6f61';}
          else{resultTag='休息';resultColor='#888888';}
        }
      }
    }

    // Background & border
    let bg='rgba(250,240,228,0.03)';
    let border='1px solid transparent';
    if(!inSeason){bg='rgba(250,240,228,0.01)';}
    else if(isGame&&!isPlayoff){bg='rgba(200,90,26,0.1)';}
    else if(isPlayoff){bg='rgba(160,80,220,0.12)';}
    if(isToday){bg='rgba(240,184,78,0.25)';border='2px solid var(--gold)';}
    const opacity=(!inSeason)?'0.3':(isPast?'0.7':'1');

    html+=`<div style="background:${bg};border:${border};border-radius:6px;padding:4px;min-height:52px;opacity:${opacity};display:flex;flex-direction:column;align-items:center;justify-content:space-between">`;
    // Date number
    html+=`<div style="font-size:12px;font-weight:700;color:${isToday?'var(--gold)':'var(--text)'}">${day}</div>`;
    // Middle: opponent or training indicator
    if(inSeason&&isGame&&fix){
      html+=`<div style="font-size:9px;color:var(--primary);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%">${fix.home?'vs':'@'}${fix.opponent.name}</div>`;
    }else if(inSeason&&!isGame){
      html+=`<div style="font-size:9px;color:var(--text-dim)">训练</div>`;
    }else{
      html+=`<div></div>`;
    }
    // Bottom: result
    if(resultTag){
      html+=`<div style="font-size:9px;font-weight:800;color:${resultColor};background:${resultColor}22;border-radius:3px;padding:1px 4px">${resultTag}</div>`;
    }else if(isToday){
      html+=`<div style="font-size:9px;color:var(--gold)">今天</div>`;
    }else{
      html+=`<div></div>`;
    }
    html+='</div>';
  }
  html+='</div>';

  // Legend
  html+='<div style="margin-top:10px;font-size:10px;color:var(--text-dim);display:flex;gap:10px;flex-wrap:wrap;justify-content:center">';
  html+='<span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(200,90,26,0.3)"></span>常规赛</span>';
  html+='<span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(160,80,220,0.3)"></span>季后赛</span>';
  html+='<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#6ecb89"></span>胜/高效</span>';
  html+='<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#f0b84e"></span>轻训</span>';
  html+='<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#ef6f61"></span>负/低效</span>';
  html+='</div>';

  document.getElementById('seasonCalendar').innerHTML=html;
}

function calNav(dir){
  _calViewMonth+=dir;
  // Clamp to season's 3 months (0, 1, 2)
  if(_calViewMonth<0)_calViewMonth=0;
  if(_calViewMonth>2)_calViewMonth=2;
  renderCalendar();
}

function calSwitchSeason(ord){
  _calViewOrdinal=ord;
  _calViewMonth=0;
  renderCalendar();
}

function calGoToday(){
  _calViewOrdinal=G.seasonOrdinal||0;
  // Reset to the month containing today
  const start=new Date(calcSeasonStartDate(_calViewOrdinal)+'T00:00:00');
  const realToday=beijingNow();
  _calViewMonth=realToday.getMonth()-start.getMonth()+(realToday.getFullYear()-start.getFullYear())*12;
  if(_calViewMonth<0)_calViewMonth=0;
  if(_calViewMonth>2)_calViewMonth=2;
  renderCalendar();
}

window.calNav=calNav;
window.calSwitchSeason=calSwitchSeason;
window.calGoToday=calGoToday;

  document.getElementById('seasonArchive').innerHTML=sorted.map(a=>`
    <div style="padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700;font-size:13px">${a.season}</span>
        <span style="font-size:12px;color:var(--gold);font-weight:700">${a.wins||0}-${a.losses||0}</span>
      </div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px">${a.topPlayer?'MVP: '+a.topPlayer+' (+'+a.topGrowth+') · ':''}${(a.awards||[]).length}枚奖项 · ${a.totalDays||0}天</div>
    </div>
  `).join('');
}

function renderAchievements(){
  const rarities=[{r:4,title:'⭐⭐⭐⭐ 传说'},{r:3,title:'⭐⭐⭐ 史诗'},{r:2,title:'⭐⭐ 稀有'},{r:1,title:'⭐ 普通'}];
  document.getElementById('achieveContent').innerHTML=rarities.map(({r,title})=>{
    const items=AWARDS.filter(a=>a.rarity===r);
    return`<div class="award-section"><div class="as-title">${title}</div><div class="award-grid">${items.map(a=>{
      const earned=G.awards.includes(a.id);
      return`<div class="award-card rarity-${r} ${earned?'earned':'locked'}"><div class="award-icon">${earned?a.icon:'🔒'}</div><div class="award-name">${a.name}</div><div class="award-desc">${a.desc}</div></div>`;
    }).join('')}</div></div>`;
  }).join('');
}

function renderSettings(){
  document.getElementById('setStart').value=G.seasonStart;
  document.getElementById('setTasks').innerHTML=PLAYERS.map(p=>{
    const t=G.tasks&&G.tasks[p.id]?G.tasks[p.id]:p.task;
    return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:14px;width:28px">${p.emoji}</span><input class="set-input" style="flex:1" value="${t}" data-pid="${p.id}" onchange="updateTask(this)"></div>`;
  }).join('');
}

// ============================================================

  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.nav-btn[data-p="${t}"]`).classList.add('active');
  if(t==='players')renderPlayers();if(t==='season')renderSeason();if(t==='achievements')renderAchievements();
}
function toggleMorning(){
  const b=document.getElementById('morningBody'),t=document.getElementById('morningToggle');
  b.classList.toggle('open');t.classList.toggle('open');
}
function toggleMorningReview(){
  const b=document.getElementById('mrBody'),t=document.getElementById('mrToggle');
  b.classList.toggle('open');t.classList.toggle('open');
}
function saveMorningReview(showToast){
  if(!G.morningReview)G.morningReview={};
  G.morningReview.didRight=document.getElementById('mrDidRight')?.value||'';
  G.morningReview.didWrong=document.getElementById('mrDidWrong')?.value||'';
  G.morningReview.learned=document.getElementById('mrLearned')?.value||'';
  G.morningReview.surprise=document.getElementById('mrSurprise')?.value||'';
  G.morningReview.mostImportant=document.getElementById('mrMostImportant')?.value||'';
  G.morningReview.playerGrow=document.getElementById('mrPlayerGrow')?.value||'';

  if(showToast)toast('💾 复盘与计划已保存','success');
}
function renderMorningReview(){
  const mr=G.morningReview||{};
  const fields={mrDidRight:'didRight',mrDidWrong:'didWrong',mrLearned:'learned',mrSurprise:'surprise',mrMostImportant:'mostImportant',mrPlayerGrow:'playerGrow',mrObstacle:'obstacle'};
  Object.entries(fields).forEach(([elId,key])=>{
    const el=document.getElementById(elId);
    if(el)el.value=mr[key]||'';
  });

  if(toggle&&mr.saved){
    if(!toggle.querySelector('.mr-done-badge')){
      toggle.insertAdjacentHTML('beforeend',' <span class="mr-done-badge">✓ 已填</span>');

function setMC(k,v){G.morningCheck[k]=v;save();renderToday()}
function updateTask(el){if(!G.tasks)G.tasks={};G.tasks[el.dataset.pid]=el.value;save()}
function saveSettings(){G.seasonStart=document.getElementById('setStart').value;save();renderAll();toast('✅ 设置已保存','success')}
function exportData(){const b=new Blob([JSON.stringify(G,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='minho_os_backup.json';a.click();toast('📤 数据已导出','success')}
function importData(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{G=JSON.parse(ev.target.result);save();renderAll();toast('📥 数据已导入','success')}catch(e){toast('❌ 文件格式错误','error')}};r.readAsText(f)};i.click()}
function resetGame(){if(confirm('确定重置所有数据？')&&confirm('再次确认？')){localStorage.removeItem('minho_os_v8');G=getDefault();save();renderAll();toast('🔄 已重置全部数据','warning')}}
function toast(msg,type){const c=document.getElementById('toasts');const t=document.createElement('div');t.className='toast'+(type?' toast-'+type:'');t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),2800)}

// ============================================================
// SYNC: URL parameter based cross-device sync
// ============================================================
function compressData(obj){
  // Strip history arrays to keep payload small (they're not critical for sync)
  const payload=JSON.parse(JSON.stringify(obj));
  delete payload.history;
  if(payload.archive)payload.archive.forEach(a=>delete a.history);
  const json=JSON.stringify(payload);
  const bytes=new TextEncoder().encode(json);
  let b64=btoa(String.fromCharCode(...bytes));
  return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decompressData(str){
  let b64=str.replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length%4)b64+='=';
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const json=new TextDecoder().decode(bytes);
  return JSON.parse(json);
}
function syncExport(){
  const encoded=compressData(G);
  const url=location.origin+location.pathname+'?sync='+encoded;
  const area=document.getElementById('syncQrArea');
  area.style.display='block';
  if(url.length>2500){
    // Fallback: copy sync code
    area.innerHTML=`
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-size:11px;color:var(--text-dim)">
        <div style="margin-bottom:8px;color:var(--gold);font-weight:700">同步码（复制到另一台设备）：</div>
        <textarea id="syncCode" readonly style="width:100%;min-height:60px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:10px;font-family:monospace;word-break:break-all">${encoded}</textarea>
        <button class="btn btn-primary" style="margin-top:8px;width:100%" onclick="copySyncCode()">📋 复制同步码</button>
        <div style="margin-top:6px;font-size:10px">在另一台设备点「输入同步码」粘贴即可</div>
      </div>`;
  }else{
    // QR code via API
    area.innerHTML=`
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center">
        <div style="margin-bottom:8px;font-size:11px;color:var(--gold);font-weight:700">扫码同步到另一台设备</div>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}" style="width:180px;height:180px;border-radius:8px;background:#fff;padding:8px"/>
        <div style="margin-top:8px;font-size:10px;color:var(--text-dim)">或复制链接：</div>
        <textarea id="syncUrl" readonly style="width:100%;min-height:36px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px;color:var(--text);font-size:9px;font-family:monospace;margin-top:4px;word-break:break-all">${url}</textarea>
        <button class="btn btn-outline" style="margin-top:6px;font-size:11px" onclick="copySyncUrl()">📋 复制链接</button>
      </div>`;
  }
  toast('📱 同步码已生成','success');
}
function copySyncCode(){
  const el=document.getElementById('syncCode');
  if(el){el.select();document.execCommand('copy');toast('✅ 已复制同步码','success');}
}
function copySyncUrl(){
  const el=document.getElementById('syncUrl');
  if(el){el.select();document.execCommand('copy');toast('✅ 已复制链接','success');}
}
function syncImportPrompt(){
  const code=prompt('粘贴同步码（从另一台设备复制）：');
  if(!code||!code.trim())return;
  try{
    const data=decompressData(code.trim());
    if(!data.seasonStart||!data.players){throw new Error('invalid');}
    if(!data.history)data.history=[];
    G=data;save();syncSeason();dailyReset();renderAll();
    toast('📱 同步数据已导入！','success');
  }catch(e){
    toast('❌ 同步码无效，请重新复制','error');
  }
}
function checkUrlSync(){
  const params=new URLSearchParams(location.search);
  const syncData=params.get('sync');
  if(!syncData)return;
  try{
    const data=decompressData(syncData);
    if(!data.seasonStart||!data.players)return;
    if(confirm('检测到同步数据，是否导入？（将覆盖本地数据）')){
      if(!data.history)data.history=[];
      G=data;save();syncSeason();dailyReset();renderAll();
      toast('📱 同步数据已导入！','success');
    }
    history.replaceState(null,'',location.pathname);
  }catch(e){/* ignore invalid sync param */}
}

window.syncExport=syncExport;window.syncImportPrompt=syncImportPrompt;
window.copySyncCode=copySyncCode;window.copySyncUrl=copySyncUrl;

window.toggleTask=toggleTask;window.switchTab=switchTab;window.toggleMorning=toggleMorning;
window.toggleMorningReview=toggleMorningReview;window.saveMorningReview=saveMorningReview;
window.setMC=setMC;window.updateTask=updateTask;window.saveSettings=saveSettings;
window.exportData=exportData;window.importData=importData;window.resetGame=resetGame;

// INIT — sync season to real time on every load
function syncSeason(){
  // Method 1: use rawSeasonDay to catch up
  let attempts=0;
  while(rawSeasonDay()>90&&attempts<20){archiveSeason();attempts++;}
  // Method 2: if ordinal is still behind (e.g. corrupted seasonStart), force fix
  const correctOrd=calcInitialOrdinal();
  if((G.seasonOrdinal||0)<correctOrd){
    // Force catch up to current season
    while((G.seasonOrdinal||0)<correctOrd){archiveSeason();}
  }
}
syncSeason();
checkUrlSync();
dailyReset();renderAll();

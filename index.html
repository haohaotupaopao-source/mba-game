<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>MBA · 绝望的烤鸡</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="绝望的烤鸡">
<meta name="theme-color" content="#080A0F">
<meta name="description" content="Minho的NBA主题自律游戏">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23080A0F'/><text y='.9em' font-size='70' text-anchor='middle' x='50'>🍗</text></svg>">
<style>
:root {
  --bg:#080A0F;--bg2:#0D121B;--surface:#111723;--surface-2:#151D2B;--card:#182231;--card-2:#1D2A3D;
  --border:#2C3C52;--border-soft:rgba(255,255,255,0.08);
  --primary:#F26B21;--primary-2:#C94A12;--gold:#FFB627;--gold-dim:rgba(255,182,39,0.14);
  --text:#F7FAFC;--text-dim:#9FB0C7;--text-muted:#68788F;
  --win:#22C55E;--lose:#EF4444;--warning:#F59E0B;--blue:#38BDF8;
  --radius:10px;--radius-sm:7px;--radius-lg:14px;
  --shadow:0 8px 24px rgba(0,0,0,0.28);--shadow-lg:0 16px 42px rgba(0,0,0,0.38);
  --shadow-glow:0 0 0 1px rgba(255,182,39,0.45),0 10px 30px rgba(255,182,39,0.12);
  --font:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  --ease:cubic-bezier(0.4,0,0.2,1);--dur:0.22s;
  --glow:rgba(242,107,33,0.24);--glow2:transparent;
  --nav-bg:rgba(17,23,35,0.92);--header-bg:linear-gradient(135deg,rgba(24,34,49,0.98) 0%,rgba(12,17,27,0.98) 100%);
  --match-bg:linear-gradient(135deg,#192537,#111827);--task-card-bg:linear-gradient(180deg,var(--card),var(--surface));
  --task-card-hover:var(--shadow);--pc-fill-bg:var(--surface);--award-bg:var(--card);
  --main-focus-bg:linear-gradient(180deg,#1D2A3D,#151D2B);
  --safe-top:env(safe-area-inset-top,0px);
}
/* Light theme */
.light {
  --safe-top:env(safe-area-inset-top,0px);
  --bg:#F0F2F5;--bg2:#E5E7EB;--surface:#FFFFFF;--surface-2:#F9FAFB;--card:#FFFFFF;--card-2:#F3F4F6;
  --border:#D1D5DB;--border-soft:rgba(0,0,0,0.06);
  --primary:#E85D04;--primary-2:#C2410C;--gold:#B45309;--gold-dim:rgba(180,83,9,0.1);
  --text:#111827;--text-dim:#6B7280;--text-muted:#9CA3AF;
  --win:#16A34A;--lose:#DC2626;--warning:#D97706;--blue:#0284C7;
  --shadow:0 4px 16px rgba(0,0,0,0.06);--shadow-lg:0 12px 32px rgba(0,0,0,0.1);
  --shadow-glow:0 0 0 1px rgba(180,83,9,0.3),0 8px 24px rgba(180,83,9,0.08);
  --glow:rgba(232,93,4,0.1);--glow2:transparent;
  --nav-bg:rgba(255,255,255,0.92);--header-bg:linear-gradient(135deg,rgba(255,255,255,0.98) 0%,rgba(249,250,251,0.98) 100%);
  --match-bg:linear-gradient(135deg,#F0F2F5,#FFFFFF);--task-card-bg:linear-gradient(180deg,#FFFFFF,#F9FAFB);
  --task-card-hover:0 4px 16px rgba(0,0,0,0.06);--pc-fill-bg:#E5E7EB;--award-bg:#FFFFFF;
  --main-focus-bg:linear-gradient(180deg,#FFF7ED,#FFF1F2);
}
@supports(padding-top:env(safe-area-inset-top)){body{padding-top:env(safe-area-inset-top)}}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg)}
body{font-family:var(--font);background:radial-gradient(circle at 50% -120px,var(--glow),var(--glow2) 42%),linear-gradient(180deg,var(--bg) 0%,var(--bg2) 58%,var(--bg) 100%);color:var(--text);min-height:100vh;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased}
.app{max-width:560px;margin:0 auto;padding:0 0 76px}
/* HEADER */
.header{background:var(--header-bg);padding:14px 18px;border-bottom:1px solid var(--border-soft);position:sticky;top:var(--safe-top);z-index:10;backdrop-filter:blur(14px);box-shadow:0 10px 26px rgba(0,0,0,0.22)}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.team-name{font-size:18px;font-weight:900;color:var(--text);display:flex;align-items:center;gap:7px;letter-spacing:0}
.team-name .icon{font-size:23px;filter:drop-shadow(0 2px 6px rgba(242,107,33,0.5))}
.header-stats{display:flex;gap:6px;font-size:11px;color:var(--text-dim);flex-wrap:wrap;justify-content:flex-end}
.header-stats .hs{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border-soft);border-radius:999px;padding:4px 7px}
.header-stats .hs .val{color:var(--gold);font-weight:800}
.header-sub{margin-top:10px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);flex-wrap:wrap}
.header-sub .phase{padding:4px 9px;border-radius:999px;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;font-weight:800;font-size:10px;box-shadow:0 6px 14px rgba(242,107,33,0.24)}
.header-sub .main-player{color:var(--gold);font-weight:700}
.warning-bar{padding:7px 18px;font-size:11px;font-weight:700;display:none;transition:all var(--dur) var(--ease)}
.warning-bar.yellow{display:block;background:#F59E0B;color:#101010}
.warning-bar.orange{display:block;background:#F97316;color:#fff}
.warning-bar.red{display:block;background:#EF4444;color:#fff}
/* CONTENT */
.content{padding:16px}
.tab-page{display:none}.tab-page.active{display:block;animation:fadeUp .25s var(--ease)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* SECTION TITLES */
.section-title{font-size:12px;font-weight:900;color:var(--text-dim);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.04em}
.section-divider{height:1px;background:linear-gradient(90deg,var(--primary),transparent);opacity:.45;margin-bottom:12px}
/* MORNING CHECK */
.morning-panel{background:linear-gradient(180deg,var(--card),var(--surface));border:1px solid var(--border-soft);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden;transition:box-shadow var(--dur) var(--ease),border-color var(--dur) var(--ease)}
.morning-panel:hover{box-shadow:var(--shadow);border-color:rgba(255,255,255,0.14)}
.morning-toggle{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;font-size:14px;font-weight:800;transition:background var(--dur) var(--ease)}
.morning-toggle .mt-left{display:flex;align-items:center;gap:6px}
.morning-toggle .mc-summary{font-size:10px;font-weight:400;color:var(--text-muted);margin-top:2px}
.morning-toggle:active{background:rgba(255,255,255,0.03)}
.morning-toggle .arr{transition:transform var(--dur) var(--ease)}
.morning-toggle.open .arr{transform:rotate(180deg)}
.morning-body{padding:0 16px 16px;display:none}
.morning-body.open{display:block;animation:fadeUp .2s var(--ease)}
.mc-group{margin-bottom:12px}
.mc-label{font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:600}
.mc-options{display:flex;gap:6px;flex-wrap:wrap}
.mc-opt{padding:7px 12px;border-radius:999px;border:1px solid var(--border-soft);font-size:12px;cursor:pointer;transition:all var(--dur) var(--ease);background:rgba(255,255,255,0.04);color:var(--text-dim)}
.mc-opt:active{transform:scale(0.95)}
.mc-opt.selected{background:linear-gradient(135deg,var(--primary),var(--primary-2));border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(242,107,33,0.22)}
.mood-row{display:flex;gap:6px}
.mood-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;background:var(--surface);transition:all var(--dur) var(--ease)}
.mood-btn:active{transform:scale(0.9)}
.mood-btn.selected{border-color:var(--gold);background:var(--gold);color:#000;transform:scale(1.1);box-shadow:0 0 10px rgba(232,160,37,0.3)}
/* MC HISTORY */
.mc-history-strip{display:flex;gap:4px;align-items:center;margin-top:8px;flex-wrap:wrap}
.mc-history-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:1px solid var(--border-soft)}
.mc-insight{font-size:10px;color:var(--text-dim);margin-top:4px;line-height:1.5}
.mc-insight b{color:var(--gold)}
/* MATCH PREDICTOR */
.match-bar{background:var(--match-bg);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;transition:all var(--dur) var(--ease);box-shadow:var(--shadow)}
.match-bar:hover{box-shadow:var(--shadow-lg)}
.match-bar .team{font-size:13px;font-weight:900;color:var(--text)}
.match-bar .score{font-size:28px;font-weight:950;color:var(--gold);line-height:1;text-shadow:0 0 18px rgba(255,182,39,0.25)}
.match-bar .result-tag{padding:5px 11px;border-radius:999px;font-size:11px;font-weight:900;transition:all var(--dur) var(--ease);white-space:nowrap}
.match-bar .result-tag.win{background:rgba(34,197,94,0.16);color:var(--win);border:1px solid rgba(34,197,94,0.32)}
.match-bar .result-tag.lose{background:rgba(239,68,68,0.16);color:var(--lose);border:1px solid rgba(239,68,68,0.32)}
.match-bar .result-tag.draw{background:rgba(159,176,199,0.13);color:var(--text-dim);border:1px solid var(--border-soft)}
.match-bar .result-tag.none{background:rgba(159,176,199,0.1);color:var(--text-muted);border:1px solid var(--border-soft)}
/* TASK GRID */
.task-grid{display:flex;flex-direction:column;gap:10px}
.task-card{background:var(--task-card-bg);border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all var(--dur) var(--ease);cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.task-card:active{transform:scale(0.985)}
.task-card:hover{box-shadow:var(--task-card-hover);border-color:rgba(255,255,255,0.16)}
.task-card.main-focus{border-color:rgba(255,182,39,0.7);box-shadow:var(--shadow-glow);background:var(--main-focus-bg)}
.task-card.done{opacity:0.74;border-color:rgba(34,197,94,0.52);animation:taskDone .3s var(--ease);background:linear-gradient(180deg,rgba(34,197,94,0.1),var(--surface))}
@keyframes taskDone{0%{transform:scale(1)}50%{transform:scale(0.95)}100%{transform:scale(1)}}
.task-card.done .tc-check{background:var(--win);border-color:var(--win);color:#fff}
.tc-emoji{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.tc-body{flex:1;min-width:0}
.tc-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.tc-name .badge{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700}
.tc-name .badge.p0{background:#E74C3C;color:#fff}
.tc-name .badge.p1{background:#E67E22;color:#fff}
.tc-name .badge.p2{background:#F1C40F;color:#000}
.tc-name .badge.p3{background:#27AE60;color:#fff}
.tc-dim{font-size:11px;color:var(--text-dim);margin-top:2px}
.tc-task{font-size:12px;color:var(--gold);margin-top:3px}
.tc-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;transition:all var(--dur) var(--ease)}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);border-top:1px solid var(--border-soft);display:flex;justify-content:space-around;padding:7px 0 max(7px,env(safe-area-inset-bottom));z-index:20;backdrop-filter:blur(16px);box-shadow:0 -10px 28px rgba(0,0,0,0.15)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border:none;background:none;color:var(--text-muted);font-size:10px;cursor:pointer;font-family:var(--font);transition:all var(--dur) var(--ease);border-radius:12px;min-width:58px}
.nav-btn .ni{font-size:20px;transition:transform var(--dur) var(--ease)}
.nav-btn.active{color:var(--gold);background:rgba(255,182,39,0.08)}
.nav-btn.active .ni{transform:scale(1.08)}
/* PLAYERS TAB */
.radar-wrap{display:flex;justify-content:center;margin-bottom:20px}
.player-cards{display:flex;flex-direction:column;gap:8px}
.player-card{background:linear-gradient(180deg,var(--card),var(--surface));border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all var(--dur) var(--ease);box-shadow:0 4px 16px rgba(0,0,0,0.16)}
.player-card:hover{box-shadow:var(--shadow);border-color:rgba(255,255,255,0.16)}
.pc-emoji{font-size:28px;width:40px;text-align:center}
.pc-body{flex:1}
.pc-top{display:flex;align-items:center;justify-content:space-between}
.pc-name{font-size:14px;font-weight:700}
.pc-rating{font-size:22px;font-weight:900;color:var(--gold)}
.pc-dim{font-size:11px;color:var(--text-dim)}
.pc-bar{height:6px;background:var(--pc-fill-bg);border-radius:3px;margin-top:6px;overflow:hidden;position:relative}
.pc-bar .fill{height:100%;border-radius:3px;transition:width .6s var(--ease)}
.pc-bar .target-mark{position:absolute;top:-2px;width:2px;height:10px;background:var(--text-dim);border-radius:1px}
.pc-streak{font-size:11px;color:var(--text-dim);margin-top:4px;display:flex;gap:8px}
/* SEASON TAB */
.season-card{background:linear-gradient(180deg,var(--card),var(--surface));border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;transition:all var(--dur) var(--ease);box-shadow:0 4px 16px rgba(0,0,0,0.16)}
.season-card:hover{box-shadow:var(--shadow);border-color:rgba(255,255,255,0.16)}
.season-card .sc-title{font-size:12px;font-weight:900;margin-bottom:10px;color:var(--text-dim);letter-spacing:.04em;text-transform:uppercase}
.progress-bar{height:10px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;margin:8px 0}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:999px;transition:width .6s var(--ease)}
.record-row{display:flex;align-items:center;gap:16px;font-size:14px}
.record-row .big{font-size:28px;font-weight:900;color:var(--gold)}
.recent-games{display:flex;gap:4px;margin-top:8px}
.recent-games .rg{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.recent-games .rg.w{background:rgba(39,174,96,0.2);color:var(--win)}
.recent-games .rg.l{background:rgba(192,57,43,0.2);color:var(--lose)}
/* ACHIEVEMENTS TAB */
.award-section{margin-bottom:20px}
.award-section .as-title{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.award-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.award-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;transition:all var(--dur) var(--ease)}
.award-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.award-card.earned{opacity:1}.award-card.locked{opacity:0.35;filter:grayscale(0.5)}
.award-card.rarity-1.earned{border-color:#aaa}
.award-card.rarity-2.earned{border-color:var(--gold);box-shadow:0 0 8px rgba(232,160,37,0.1)}
.award-card.rarity-3.earned{border-image:linear-gradient(135deg,#ff6b6b,#ffa500,#ffd700,#48dbfb,#ff6b9d) 1}
.award-card.rarity-4.earned{border-image:linear-gradient(135deg,#a8edea,#fed6e3,#d4fc79,#96e6a1,#a8edea) 1;box-shadow:0 0 12px rgba(200,200,255,0.2)}
.award-icon{font-size:28px;margin-bottom:4px}
.award-name{font-size:11px;font-weight:700}
.award-desc{font-size:10px;color:var(--text-dim);margin-top:2px}
/* SETTINGS TAB */
.set-group{margin-bottom:18px}
.set-label{font-size:11px;color:var(--text-dim);font-weight:600;margin-bottom:6px}
.set-input{width:100%;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:var(--font);transition:border-color var(--dur) var(--ease)}
.set-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(200,90,26,0.15)}
.btn{padding:8px 16px;border:none;border-radius:999px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font);transition:all var(--dur) var(--ease)}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;box-shadow:0 8px 18px rgba(242,107,33,0.22)}
.btn-primary:hover{filter:brightness(1.08);box-shadow:0 10px 24px rgba(242,107,33,0.28)}
.btn-outline{background:rgba(255,255,255,0.04);border:1px solid var(--border-soft);color:var(--text-dim)}
.btn-outline:hover{border-color:rgba(255,255,255,0.18);color:var(--text)}
.btn-danger{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.35);color:var(--lose)}
.btn-danger:hover{background:rgba(239,68,68,0.14)}
/* TOAST */
.toast-box{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--gold);border-radius:12px;padding:11px 18px;font-size:12px;font-weight:800;box-shadow:var(--shadow-lg);animation:toastIn .3s var(--ease),toastOut .3s var(--ease) 2.2s forwards;white-space:nowrap}
.toast.toast-success{border-color:var(--win)}
.toast.toast-warning{border-color:var(--warning)}
.toast.toast-error{border-color:var(--lose)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--surface);border:2px solid var(--gold);border-radius:var(--radius);padding:28px;text-align:center;max-width:340px;width:90%}
.modal h2{font-size:20px;color:var(--gold);margin-bottom:6px}
.modal .big{font-size:48px;margin:12px 0}
/* NBA DATA PANELS */
.data-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.data-pill{background:linear-gradient(180deg,var(--card),var(--surface));border:1px solid var(--border-soft);border-radius:var(--radius);padding:10px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.14)}
.data-pill .k{font-size:10px;color:var(--text-muted);font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.data-pill .v{font-size:18px;color:var(--text);font-weight:950;margin-top:2px;line-height:1}
.data-pill .s{font-size:10px;color:var(--text-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.coach-note{background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.22);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:12px;font-size:12px;color:var(--text-dim);line-height:1.55}
.coach-note b{color:var(--blue)}
@media(max-width:420px){.header-stats{gap:4px}.header-stats .hs{font-size:10px;padding:3px 6px}.team-name{font-size:16px}.content{padding:12px}.match-bar{padding:12px;gap:6px}.match-bar .score{font-size:24px}.data-strip{gap:6px}.data-pill{padding:8px 6px}.data-pill .v{font-size:16px}.nav-btn{min-width:auto;padding:6px 8px}.tc-name{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="app">
<!-- HEADER -->
<div class="header">
<div class="header-top">
<div class="team-name"><span class="icon">🍗</span>绝望的烤鸡</div>
<div class="header-stats">
<div class="hs" onclick="toggleTheme()" style="cursor:pointer" id="themeBtn" title="切换日间/夜间模式">🌙</div>
<div class="hs">🏀 <span class="val" id="hWins">0</span>-<span id="hLosses">0</span></div>

  PLAYERS.forEach(p=>{ps[p.id]={rating:p.initRating,streak:0,missStreak:0}});

    seasonStart:calcSeasonStartDate(ord),
    seasonOrdinal:ord,
    players:ps,

    dailyCompleted:{},

    morningCheckHistory:[],
    _dataVersion:CONST.DATA_VERSION,
    wins:0,losses:0,recentGames:[],
    totalTasksDone:0,totalDays:0,
    awards:[],history:[],
    activeStreak:0,
    archive:[]
  };
}
function migrate(data){
  if(!data._dataVersion||data._dataVersion<CONST.DATA_VERSION){
    if(!data.morningCheckHistory)data.morningCheckHistory=[];
    data._dataVersion=CONST.DATA_VERSION;
  }
  return data;
}
function load(){const r=localStorage.getItem(CONST.STORAGE_KEY);if(!r)return getDefault();try{return migrate(JSON.parse(r))}catch(e){return getDefault()}}

// ============================================================
// ENGINE
// ============================================================
function dateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function beijingNow(){
  const now=new Date();
  return new Date(now.getTime()+CONST.BEIJING_OFFSET+(now.getTimezoneOffset()*60000));
}
function today(){
  const bj=beijingNow();
  if(bj.getHours()<CONST.DAY_BOUNDARY_HOUR) bj.setDate(bj.getDate()-1);
  return dateStr(bj);
}
function calcInitialOrdinal(){
  const bj=beijingNow();
  const month=bj.getMonth(); // 0-11
  const year=bj.getFullYear();
  // Q3=7-9月(idx0), Q4=10-12月(idx1), Q1=1-3月(idx2), Q2=4-6月(idx3)
  let si;
  if(month>=6&&month<=8)si=0;      // Jul-Sep = Q3
  else if(month>=9&&month<=11)si=1; // Oct-Dec = Q4
  else if(month>=0&&month<=2)si=2;  // Jan-Mar = Q1
  else si=3;                        // Apr-Jun = Q2
  // For Q1/Q2, the "year" is the next year relative to Q3 start
  const baseYear=(month<=2)?(year-1):((month<=5)?(year-1):year);
  return(baseYear-2025)*4+si;
}
// Season start date: the 1st day of the quarter
function calcSeasonStartDate(ordinal){
  const ord=ordinal||0;
  const baseYear=2025+Math.floor(ord/4);
  const qi=ord%4; // 0=Q3, 1=Q4, 2=Q1, 3=Q2
  // Q3: Jul 1, Q4: Oct 1, Q1: Jan 1 (next year), Q2: Apr 1 (next year)
  if(qi===0)return`${baseYear}-07-01`;
  if(qi===1)return`${baseYear}-10-01`;
  if(qi===2)return`${baseYear+1}-01-01`;
  return`${baseYear+1}-04-01`;
}
function seasonLabel(ordParam){
  const ord=(ordParam!==undefined)?ordParam:(G.seasonOrdinal||0);
  const baseYear=2025+Math.floor(ord/4);
  const qi=ord%4;
  if(qi===0)return`${baseYear}Q3`;
  if(qi===1)return`${baseYear}Q4`;
  if(qi===2)return`${baseYear+1}Q1`;
  return`${baseYear+1}Q2`;
}
// Get the real date for a given season day offset
function realDateForDay(dayNum){
  const start=new Date(G.seasonStart+'T00:00:00');
  const d=new Date(start);
  d.setDate(d.getDate()+dayNum-1);
  return d;
}
function formatDate(d){
  return`${d.getMonth()+1}/${d.getDate()}`;
}
function rawSeasonDay(){return Math.floor((new Date(today())-new Date(G.seasonStart))/(CONST.MS_PER_DAY))+1}
function seasonDay(){return Math.max(1,Math.min(CONST.SEASON_DAYS,rawSeasonDay()))}
function currentWeekIdx(){return Math.floor((seasonDay()-1)/7)%CONST.WEEK_ORDER_COUNT}
function mainPlayerId(){return WEEK_ORDER[currentWeekIdx()]}
function mainPlayer(){return PLAYERS.find(p=>p.id===mainPlayerId())}
function phase(){const d=seasonDay();if(d<=CONST.REGULAR_SEASON_END)return'常规赛';if(d<=CONST.PLAYOFF_END)return'季后赛';return'赛季结算'}
function completedCount(){return Object.values(G.dailyCompleted).filter(Boolean).length}

// Seeded PRNG for deterministic schedule per season
function seededRng(seed){
  let s=seed;
  return function(){s=(s*1664525+1013904223)&0xFFFFFFFF;return(s>>>0)/0xFFFFFFFF;};
}

// Generate game day set for a season (randomized but deterministic per ordinal)
// Regular season: 35 games in 70 days (days 6-75)
// Playoffs: 8 games in 12 days (days 76-87)
// Pattern: mostly alternating, some 2-day streaks, rare 3-day streaks
function generateGameDays(ordinal){
  const rng=seededRng((ordinal||0)*CONST.GAME_DAYS_SEED_MULTIPLIER+CONST.GAME_DAYS_SEED_ADD);
  const gameDays=new Set();
  let day=1;let gamesPlaced=0;
  while(gamesPlaced<CONST.GAMES_REGULAR&&day<=CONST.REGULAR_SEASON_END){
    gameDays.add(day);gamesPlaced++;
    if(gamesPlaced>=CONST.GAMES_REGULAR)break;
    const roll=rng();
    if(roll<0.35&&day+1<=CONST.REGULAR_SEASON_END&&gamesPlaced<CONST.GAMES_REGULAR){
      day++;gameDays.add(day);gamesPlaced++;
      if(gamesPlaced>=CONST.GAMES_REGULAR)break;
      day+=rng()<0.5?2:3;
    }else if(roll<0.45&&day+2<=CONST.REGULAR_SEASON_END&&gamesPlaced+1<CONST.GAMES_REGULAR){
      day++;gameDays.add(day);gamesPlaced++;
      if(gamesPlaced>=CONST.GAMES_REGULAR)break;
      day++;gameDays.add(day);gamesPlaced++;
      if(gamesPlaced>=CONST.GAMES_REGULAR)break;
      day+=rng()<0.5?3:4;
    }else{
      day+=rng()<0.6?2:3;
    }
  }
  if(gamesPlaced<CONST.GAMES_REGULAR){
    for(let d=1;d<=CONST.REGULAR_SEASON_END&&gamesPlaced<CONST.GAMES_REGULAR;d++){
      if(!gameDays.has(d)){gameDays.add(d);gamesPlaced++;}
    }
  }
  let pDay=CONST.PLAYOFF_END-11;let pGames=0;
  while(pGames<CONST.GAMES_PLAYOFF&&pDay<=CONST.PLAYOFF_END){
    gameDays.add(pDay);pGames++;
    if(pGames>=CONST.GAMES_PLAYOFF)break;
    const pr=rng();
    if(pr<0.4&&pDay+1<=CONST.PLAYOFF_END&&pGames<CONST.GAMES_PLAYOFF){
      pDay++;gameDays.add(pDay);pGames++;
      if(pGames>=CONST.GAMES_PLAYOFF)break;
      pDay+=2;
    }else{
      pDay+=rng()<0.5?1:2;
    }
  }
  if(pGames<CONST.GAMES_PLAYOFF){for(let d=CONST.PLAYOFF_END-11;d<=CONST.PLAYOFF_END&&pGames<CONST.GAMES_PLAYOFF;d++){if(!gameDays.has(d)){gameDays.add(d);pGames++;}}}
  return gameDays;
}

// Cache game days for current season
let _gameDayCache=null;let _gameDayCacheOrd=null;
function getGameDays(){
  const ord=G.seasonOrdinal||0;
  if(_gameDayCache&&_gameDayCacheOrd===ord)return _gameDayCache;
  _gameDayCache=generateGameDays(ord);
  _gameDayCacheOrd=ord;
  return _gameDayCache;
}

function isGameDay(d){
  if(!d)d=seasonDay();
  if(d>CONST.PLAYOFF_END)return false;
  return getGameDays().has(d);
}
function todayLabel(){
  const d=seasonDay();
  if(d<=CONST.REGULAR_SEASON_END)return isGameDay(d)?'常规赛·比赛日':'常规赛·训练日';
  if(d<=CONST.PLAYOFF_END)return'季后赛·比赛日';
  return'赛季结算';
}

// Generate season schedule: assigns opponents to each game day
function buildSchedule(ordinal){
  const offset=(ordinal||0)*CONST.SCHEDULE_OFFSET_MULTIPLIER%OPPONENTS.length;
  const opps=[...OPPONENTS.slice(offset),...OPPONENTS.slice(0,offset)];
  const gameDays=generateGameDays(ordinal);
  const sorted=[...gameDays].sort((a,b)=>a-b);
  const schedule=[];
  sorted.forEach((d,i)=>{
    const opp=opps[i%opps.length];
    const home=i%2===0;
    let phaseLabel='常规赛';
    if(d<=5)phaseLabel='季前赛';
    else if(d>CONST.REGULAR_SEASON_END)phaseLabel='季后赛';
    schedule.push({day:d,opponent:opp,home,gameNo:i+1,phase:phaseLabel});
  });
  return schedule;
}

function todayFixture(schedule){
  const d=seasonDay();
  if(!isGameDay(d))return null;
  const sched=schedule||buildSchedule(G.seasonOrdinal||0);
  return sched.find(f=>f.day===d)||null;
}

function nextFixture(schedule){
  const d=seasonDay();
  const sched=schedule||buildSchedule(G.seasonOrdinal||0);
  return sched.find(f=>f.day>=d)||null;
}

// Season archive: save current season stats and start fresh
function archiveSeason(){
  if(!G.archive)G.archive=[];
  const name=seasonLabel();
  // Only archive if the season was actually played (has days logged)
  if(G.totalDays>0||G.wins>0||G.losses>0){
    // avoid duplicate archives for the same season
    G.archive=G.archive.filter(a=>a.season!==name);
    // find top growth player
    let topPlayer='',topGrowth=0;
    PLAYERS.forEach(p=>{
      const growth=G.players[p.id].rating-p.initRating;
      if(growth>topGrowth){topGrowth=growth;topPlayer=p.name;}
    });
    G.archive.push({
      season:name,
      wins:G.wins,losses:G.losses,
      totalDays:G.totalDays,
      awards:[...G.awards],
      topPlayer,topGrowth,
      ratings:Object.fromEntries(PLAYERS.map(p=>[p.id,G.players[p.id].rating])),
      history:G.history?[...G.history]:[]
    });
  }
  // Start new season — keep ratings and archive, reset everything else
  G.seasonOrdinal=(G.seasonOrdinal||0)+1;
  G.seasonStart=calcSeasonStartDate(G.seasonOrdinal);
  _gameDayCache=null;_gameDayCacheOrd=null;
  G.wins=0;G.losses=0;G.recentGames=[];
  G.totalDays=0;G.history=[];
  G.activeStreak=0;G.weeklyMain={};
  G.awards=[];
  G.dailyCompleted={};
  G.morningCheck={sleepTime:'',sleepDuration:'',mood:0};
  G.today=today();
  // Reset streaks but keep ratings
  PLAYERS.forEach(p=>{G.players[p.id].streak=0;G.players[p.id].missStreak=0;});
  save();
  toast('🏆 赛季归档完成！新赛季开始');
}

// Priority weights: P0 is critical, P3 is supporting
const PRIORITY_WEIGHT={P0:4,P1:3,P2:2,P3:1.5};

// Weighted match score: considers priority + OVR
function calcMatchScore(completed){
  let score=0, maxScore=0;
  PLAYERS.forEach(p=>{
    const ps=G.players[p.id];
    const pw=PRIORITY_WEIGHT[p.priority];
    const ovrMul=ps.rating/CONST.RATING_BASE;
    const impact=pw*ovrMul;
    maxScore+=impact;
    if(completed[p.id]){
      score+=impact;
    }else{
      if(p.priority==='P0')score-=impact*0.5;
      else if(p.priority==='P1')score-=impact*0.3;
    }
  });
  return{score,maxScore,pct:maxScore>0?score/maxScore:0};
}

function matchResult(completed){
  const{score,maxScore,pct}=calcMatchScore(completed);
  const diff=Math.round(score-maxScore*CONST.MATCH_BASE_THRESHOLD);
  if(pct>=CONST.MATCH_THRESHOLD_GREAT)return{tag:'大胜',cls:'win',pts:diff,pct};
  if(pct>=CONST.MATCH_THRESHOLD_SMALL)return{tag:'小胜',cls:'win',pts:diff,pct};
  if(pct>=CONST.MATCH_THRESHOLD_CLOSE)return{tag:'险胜',cls:'win',pts:diff,pct};
  if(pct>=CONST.MATCH_THRESHOLD_MIN)return{tag:'小负',cls:'lose',pts:diff,pct};
  return{tag:'大负',cls:'lose',pts:diff,pct};
}

function calcTrainingScore(completed){
  let score=0,maxScore=0;
  PLAYERS.forEach(p=>{
    const ps=G.players[p.id];
    const impact=PRIORITY_WEIGHT[p.priority]*(ps.rating/CONST.RATING_BASE);
    maxScore+=impact;
    if(completed[p.id])score+=impact;
  });
  return{score,maxScore,pct:maxScore>0?score/maxScore:0};
}
function trainingResult(completed){
  const count=Object.values(completed).filter(Boolean).length;
  const tr=calcTrainingScore(completed);
  if(count===0)return{tag:'训练日',cls:'none',pct:0};
  if(tr.pct>=CONST.TRAINING_THRESHOLD_HIGH)return{tag:'高效训练',cls:'win',pct:tr.pct};
  if(tr.pct>=CONST.TRAINING_THRESHOLD_LIGHT)return{tag:'轻度训练',cls:'warning',pct:tr.pct};
  return{tag:'已训练',cls:'draw',pct:tr.pct};
}

function dailyReset(){
  if(G.today===today())return;
  const yComp=G.dailyCompleted;
  const yCount=Object.values(yComp).filter(Boolean).length;
  const yDay=rawSeasonDay()-1; // yesterday's actual day, unclamped
  if(yDay>0){
    PLAYERS.forEach(p=>{
      const ps=G.players[p.id];
      if(yComp[p.id]){
        ps.streak++;ps.missStreak=0;
        if(ps.streak===3)ps.rating=Math.min(CONST.RATING_MAX,ps.rating+CONST.STREAK_BONUS_3);
        if(ps.streak===7)ps.rating=Math.min(CONST.RATING_MAX,ps.rating+CONST.STREAK_BONUS_7);
        if(ps.streak>7&&ps.streak%7===0)ps.rating=Math.min(CONST.RATING_MAX,ps.rating+CONST.STREAK_BONUS_WEEKLY);
      }else{
        ps.missStreak++;ps.streak=0;
        if(ps.missStreak===3)ps.rating=Math.max(CONST.RATING_MIN,ps.rating-CONST.MISS_PENALTY_3);
        if(ps.missStreak===7)ps.rating=Math.max(CONST.RATING_MIN,ps.rating-CONST.MISS_PENALTY_7);
        if(ps.missStreak>7&&ps.missStreak%7===0)ps.rating=Math.max(CONST.RATING_MIN,ps.rating-CONST.MISS_PENALTY_WEEKLY);
      }
    });
    if(isGameDay(yDay)){
      const mr=matchResult(yComp);
      if(mr.cls==='win'){G.wins++}else{G.losses++}
      G.recentGames.push(mr.cls==='lose'?'L':'W');
      if(G.recentGames.length>CONST.RECENT_GAMES_MAX)G.recentGames.shift();
      const sched=buildSchedule(G.seasonOrdinal||0);
      const fix=sched.find(f=>f.day===yDay);
      G.history.push({date:G.today,completed:yCount,result:mr.tag,pct:mr.pct,isGame:true,opponent:fix?fix.opponent.name:null});
    }else{
      G.history.push({date:G.today,completed:yCount,result:'训练',isGame:false});
    }
    if(G.history.length>CONST.HISTORY_MAX)G.history.shift();
    if(!G.weeklyMain)G.weeklyMain={};
    const weekMainId=WEEK_ORDER[Math.floor((yDay-1)/7)%CONST.WEEK_ORDER_COUNT];
    if(yComp[weekMainId]){
      G.weeklyMain[weekMainId]=(G.weeklyMain[weekMainId]||0)+1;
      if(G.weeklyMain[weekMainId]>=7&&!G.awards.includes('week_best')){
        G.awards.push('week_best');toast('🏅 周最佳球员！');
      }
    }
    if(yCount>=CONST.ACTIVE_STREAK_THRESHOLD){G.activeStreak++}else{G.activeStreak=0}
    G.totalDays++;
  }
  // Save morning check history before clearing
  if(!G.morningCheckHistory)G.morningCheckHistory=[];
  if(G.morningCheck.sleepTime||G.morningCheck.sleepDuration||G.morningCheck.mood){
    G.morningCheckHistory.push({date:G.today,...G.morningCheck});
    if(G.morningCheckHistory.length>CONST.MORNING_HISTORY_MAX)G.morningCheckHistory=G.morningCheckHistory.slice(-CONST.MORNING_HISTORY_MAX);
  }
  G.today=today();
  checkAwards(yComp);
  G.dailyCompleted={};
  G.morningCheck={sleepTime:'',sleepDuration:'',mood:0};
  while(rawSeasonDay()>CONST.SEASON_DAYS){if(!shouldAdvanceSeason())break;archiveSeason();}
  save();
}

function toggleTask(pid){
  const wasDone=G.dailyCompleted[pid];
  G.dailyCompleted[pid]=!wasDone;
  if(!wasDone){G.totalTasksDone++;toast('✓ '+PLAYERS.find(p=>p.id===pid).name+' 完成','success');}else{G.totalTasksDone=Math.max(0,G.totalTasksDone-1);}
  // Awards are NOT checked here — only at daily reset (6am settlement)
  save();renderAll();
}

function checkAwards(yesterdayComp){
  const earned=G.awards;
  const comp=yesterdayComp||G.dailyCompleted;
  const c=Object.values(comp).filter(Boolean).length;
  const dims=new Set(PLAYERS.filter(p=>comp[p.id]).map(p=>p.dim));
  if(dims.size>=3&&!earned.includes('triple')){earned.push('triple');toast('🏅 三双王！')}
  if(dims.size>=5&&!earned.includes('penta')){earned.push('penta');toast('🏅 五双奇迹！')}
  PLAYERS.forEach(p=>{
    const ps=G.players[p.id];
    if(ps.rating>=p.initRating+10&&!earned.includes('rookie')){earned.push('rookie');toast('🌱 最佳新秀！')}
    if(ps.rating>=p.initRating+15&&!earned.includes('mip')){earned.push('mip');toast('🚀 最快进步！')}
    if(ps.rating>=CONST.RATING_MAX-7&&!earned.includes('hundred')){earned.push('hundred');toast('💯 百分俱乐部！')}
    if(p.id==='duncan'&&ps.rating>=p.initRating+10&&!earned.includes('dpoy')){earned.push('dpoy');toast('🛡️ 最佳防守！')}
    if(p.id==='jokic'&&ps.rating>=p.initRating+5&&!earned.includes('finance')){earned.push('finance');toast('💵 财务健康！')}
  });
  if(G.totalTasksDone>=1000&&!earned.includes('lifetime')){earned.push('lifetime');toast('♾️ 终身成就！')}
  if(G.activeStreak>=14&&!earned.includes('allstar_mvp')){earned.push('allstar_mvp');toast('⭐ 全明星MVP！')}
}

function getWarning(){
  let maxMiss=0,atRisk=[],p0p1Miss=0;
  PLAYERS.forEach(p=>{
    const ps=G.players[p.id];
    maxMiss=Math.max(maxMiss,ps.missStreak);
    if(ps.missStreak>=CONST.WARNING_YELLOW_DAYS)atRisk.push(p);
    if((p.priority==='P0'||p.priority==='P1')&&ps.missStreak>=CONST.WARNING_ORANGE_DAYS)p0p1Miss++;
  });
  return{level:p0p1Miss>=2?'red':maxMiss>=CONST.WARNING_ORANGE_DAYS?'orange':maxMiss>=CONST.WARNING_YELLOW_DAYS?'yellow':'',atRisk,maxMiss};
}

function renderWeeklySummary(){
  const d=rawSeasonDay();

  if(d<1)return'';
  const dayLabels=['日','一','二','三','四','五','六'];
  let html='<div style="background:var(--card);border:1px solid var(--border-soft);border-radius:var(--radius);padding:10px 12px;margin-bottom:10px">';
  html+='<div style="font-size:11px;font-weight:700;color:var(--text-dim);margin-bottom:8px">📅 本周概览</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
  // Day headers
  for(let i=0;i<7;i++){
    const day=weekStart+i;
    if(day<1||day>d+1)continue;
    const realDate=realDateForDay(day);
    const dow=realDate.getDay();
    html+=`<div style="text-align:center;font-size:9px;font-weight:700;color:var(--text-dim);padding:2px 0">${dayLabels[dow]}</div>`;
  }
  // Values row
  for(let i=0;i<7;i++){
    const day=weekStart+i;
    if(day<1)continue;
    if(day>d)break;
    const realDate=realDateForDay(day);
    const h=G.history?G.history.find(x=>{
      const hd=new Date(x.date+'T00:00:00+08:00');
      const sd=new Date(G.seasonStart+'T00:00:00+08:00');
      return Math.floor((hd-sd)/CONST.MS_PER_DAY)+1===day;
    }):null;
    let val='-',valColor='var(--text-muted)',valBg='rgba(255,255,255,0.02)';
    if(h){
      // Past settled day — show result tag
      if(h.isGame){
        if(h.result.includes('胜')){val=h.result;valColor='var(--win)';}
        else{val=h.result;valColor='var(--lose)';}
      }else{
        if(h.result==='高效训练'){val='高效';valColor='var(--win)';}
        else if(h.result==='轻度训练'){val='轻训';valColor='var(--warning)';}
        else if(h.result==='已训练'){val='训练';valColor='var(--text-dim)';}
        else{val='休息';valColor='var(--text-muted)';}
      }
    }else if(day===d){
      val=_renderCache.completedCount+'/8';valColor='var(--text)';
    }
    html+=`<div style="text-align:center;font-size:10px;font-weight:700;color:${valColor};padding:3px 0 2px;background:${valBg};border-radius:4px">${val}</div>`;

}

function buildRadar(){
  const cx=130,cy=130,r=90,n=CONST.PLAYER_COUNT;
  const step=Math.PI*2/n;
  let svg='<svg viewBox="0 0 260 260" width="100%" style="max-width:280px">';
  [CONST.RATING_MIN,55,70,85,CONST.RATING_MAX].forEach(v=>{
    const nr=(v-CONST.RATING_MIN)/(CONST.RATING_MAX-CONST.RATING_MIN);
    let pts=[];
    for(let i=0;i<n;i++){const a=-Math.PI/2+i*step;pts.push(`${cx+r*nr*Math.cos(a)},${cy+r*nr*Math.sin(a)}`);}
    svg+=`<polygon points="${pts.join(' ')}" fill="none" stroke="rgba(250,240,228,0.08)" stroke-width="0.5"/>`;
  });
  PLAYERS.forEach((p,i)=>{
    const a=-Math.PI/2+i*step;
    svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="rgba(250,240,228,0.12)" stroke-width="0.5"/>`;
    const lx=cx+(r+18)*Math.cos(a),ly=cy+(r+18)*Math.sin(a);
    svg+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="#A07850" font-size="9">${p.name}</text>`;
    const vx=cx+(r+30)*Math.cos(a),vy=cy+(r+30)*Math.sin(a);
    svg+=`<text x="${vx}" y="${vy}" text-anchor="middle" dominant-baseline="middle" fill="#E8A025" font-size="8" font-weight="bold">${G.players[p.id].rating}</text>`;
  });
  let tPts=PLAYERS.map((p,i)=>{const a=-Math.PI/2+i*step;const nr=(p.target-CONST.RATING_MIN)/(CONST.RATING_MAX-CONST.RATING_MIN);return`${cx+r*nr*Math.cos(a)},${cy+r*nr*Math.sin(a)}`;}).join(' ');
  svg+=`<polygon points="${tPts}" fill="none" stroke="rgba(200,90,26,0.3)" stroke-width="1" stroke-dasharray="3,3"/>`;
  let cPts=PLAYERS.map((p,i)=>{const a=-Math.PI/2+i*step;const nr=(G.players[p.id].rating-CONST.RATING_MIN)/(CONST.RATING_MAX-CONST.RATING_MIN);return`${cx+r*nr*Math.cos(a)},${cy+r*nr*Math.sin(a)}`;}).join(' ');
  svg+=`<polygon points="${cPts}" fill="rgba(232,160,37,0.25)" stroke="#E8A025" stroke-width="2"/>`;
  PLAYERS.forEach((p,i)=>{const a=-Math.PI/2+i*step;const nr=(G.players[p.id].rating-CONST.RATING_MIN)/(CONST.RATING_MAX-CONST.RATING_MIN);svg+=`<circle cx="${cx+r*nr*Math.cos(a)}" cy="${cy+r*nr*Math.sin(a)}" r="3" fill="${p.color}"/>`;});
  svg+='</svg>';return svg;
}

let _calViewMonth=null; // current viewing month offset (0=season start month)
let _calViewOrdinal=null; // which season's calendar we're viewing

function initCalView(){
  // Default: show the month that contains today (real date, not game-day)
  const ord=G.seasonOrdinal||0;
  _calViewOrdinal=ord;
  const start=new Date(calcSeasonStartDate(ord)+'T00:00:00');
  const realToday=beijingNow();
  _calViewMonth=realToday.getMonth()-start.getMonth()+(realToday.getFullYear()-start.getFullYear())*12;
  if(_calViewMonth<0)_calViewMonth=0;
}

function calMonthRange(ord,monthOffset){
  const start=new Date(calcSeasonStartDate(ord)+'T00:00:00');
  const viewDate=new Date(start.getFullYear(),start.getMonth()+monthOffset,1);
  const year=viewDate.getFullYear();
  const month=viewDate.getMonth();
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  return{year,month,firstDay,lastDay,daysInMonth:lastDay.getDate()};
}

function getHistoryForDate(dateStr){
  if(!G.history)return null;
  return G.history.find(h=>h.date===dateStr)||null;
}

function getArchivedHistoryForDate(dateStr,ordinal){
  // Check archived seasons
  if(!G.archive)return null;
  for(let i=0;i<G.archive.length;i++){
    const a=G.archive[i];
    if(a.history){
      const h=a.history.find(x=>x.date===dateStr);
      if(h)return h;
    }
  }
  return null;
}

function renderCalendar(){
  if(_calViewOrdinal===null)initCalView();
  const viewOrd=_calViewOrdinal;
  const seasonStart=calcSeasonStartDate(viewOrd);
  const seasonStartD=new Date(seasonStart+'T00:00:00');
  const sched=buildSchedule(viewOrd);
  const viewGameDays=generateGameDays(viewOrd);
  const curDay=seasonDay();
  const todayStr=today(); // game-day for history lookup
  const realTodayStr=dateStr(beijingNow()); // real date for highlight
  const isCurrentSeason=(viewOrd===(G.seasonOrdinal||0));

  const{year,month,firstDay,lastDay,daysInMonth}=calMonthRange(viewOrd,_calViewMonth);
  const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const dayNames=['一','二','三','四','五','六','日'];

  // Navigation header
  let html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  html+=`<button onclick="calNav(-1)" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);cursor:pointer;font-size:14px">◀</button>`;
  html+=`<div style="text-align:center"><span style="font-weight:800;font-size:15px">${year}年${monthNames[month]}</span>`;
  html+=`<span style="font-size:11px;color:var(--text-dim);margin-left:8px">${seasonLabel(viewOrd)}</span></div>`;
  html+=`<button onclick="calNav(1)" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);cursor:pointer;font-size:14px">▶</button>`;
  html+='</div>';

  // Season switcher
  html+='<div style="display:flex;gap:6px;margin-bottom:10px;justify-content:center;flex-wrap:wrap">';
  const prevOrd=viewOrd-1;const nextOrd=viewOrd+1;
  if(prevOrd>=0){
    html+=`<button onclick="calSwitchSeason(${prevOrd})" style="font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:${viewOrd===prevOrd?'var(--primary)':'var(--surface)'};color:var(--text);cursor:pointer">${seasonLabel(prevOrd)}</button>`;
  }
  html+=`<button onclick="calSwitchSeason(${viewOrd})" style="font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--primary);color:var(--text);cursor:pointer;font-weight:700">${seasonLabel(viewOrd)}</button>`;
  html+=`<button onclick="calSwitchSeason(${nextOrd})" style="font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:${viewOrd===nextOrd?'var(--primary)':'var(--surface)'};color:var(--text);cursor:pointer">${seasonLabel(nextOrd)}</button>`;
  html+='</div>';

  // Weekday header
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">';
  dayNames.forEach(dn=>{
    html+=`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text-dim);padding:4px 0">${dn}</div>`;
  });
  html+='</div>';

  // Calendar grid
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
  // Blank cells for days before month starts (Monday=0)
  let startWeekday=(firstDay.getDay()+6)%7; // convert Sun=0 to Mon=0
  for(let i=0;i<startWeekday;i++){
    html+='<div style="min-height:52px"></div>';
  }

  for(let day=1;day<=daysInMonth;day++){
    const cellDate=new Date(year,month,day);
    const cellDateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    // Calculate season day for this date
    const diffMs=cellDate-seasonStartD;
    const sDay=Math.floor(diffMs/(864e5))+1;
    const inSeason=(sDay>=1&&sDay<=90);
    const isToday=(cellDateStr===realTodayStr&&isCurrentSeason);
    const isPast=cellDateStr<todayStr;
    const isGame=inSeason&&viewGameDays.has(sDay);
    const isPlayoff=inSeason&&sDay>75&&sDay<=87;
    const fix=isGame?sched.find(f=>f.day===sDay):null;

    // Get result from history
    let resultTag='';
    let resultColor='';
    if(isPast&&inSeason){
      let hist=null;
      if(isCurrentSeason){
        hist=getHistoryForDate(cellDateStr);
      }else{
        hist=getArchivedHistoryForDate(cellDateStr,viewOrd);
      }
      if(hist){
        if(hist.isGame){
          if(hist.result==='大胜'){resultTag='大胜';resultColor='#6ecb89';}
          else if(hist.result==='小胜'){resultTag='小胜';resultColor='#6ecb89';}
          else if(hist.result==='险胜'){resultTag='险胜';resultColor='#81c784';}
          else if(hist.result==='小负'){resultTag='小负';resultColor='#ef6f61';}
          else{resultTag='大负';resultColor='#ef6f61';}
        }else{
          // Training day: check completion
          if(hist.completed>=6){resultTag='高效';resultColor='#6ecb89';}
          else if(hist.completed>=3){resultTag='轻训';resultColor='#f0b84e';}
          else if(hist.completed>=1){resultTag='低效';resultColor='#ef6f61';}
          else{resultTag='休息';resultColor='#888888';}
        }
      }
    }

    // Background & border
    let bg='rgba(250,240,228,0.03)';
    let border='1px solid transparent';
    if(!inSeason){bg='rgba(250,240,228,0.01)';}
    else if(isGame&&!isPlayoff){bg='rgba(200,90,26,0.1)';}
    else if(isPlayoff){bg='rgba(160,80,220,0.12)';}
    if(isToday){bg='rgba(240,184,78,0.25)';border='2px solid var(--gold)';}
    const opacity=(!inSeason)?'0.3':(isPast?'0.7':'1');

    html+=`<div style="background:${bg};border:${border};border-radius:6px;padding:4px;min-height:52px;opacity:${opacity};display:flex;flex-direction:column;align-items:center;justify-content:space-between">`;
    // Date number
    html+=`<div style="font-size:12px;font-weight:700;color:${isToday?'var(--gold)':'var(--text)'}">${day}</div>`;
    // Middle: opponent or training indicator
    if(inSeason&&isGame&&fix){
      html+=`<div style="font-size:9px;color:var(--primary);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%">${fix.home?'vs':'@'}${fix.opponent.name}</div>`;
    }else if(inSeason&&!isGame){
      html+=`<div style="font-size:9px;color:var(--text-dim)">训练</div>`;
    }else{
      html+=`<div></div>`;
    }
    // Bottom: result
    if(resultTag){
      html+=`<div style="font-size:9px;font-weight:800;color:${resultColor};background:${resultColor}22;border-radius:3px;padding:1px 4px">${resultTag}</div>`;
    }else if(isToday){
      html+=`<div style="font-size:9px;color:var(--gold)">今天</div>`;
    }else{
      html+=`<div></div>`;
    }
    html+='</div>';
  }
  html+='</div>';

  // Legend
  html+='<div style="margin-top:10px;font-size:10px;color:var(--text-dim);display:flex;gap:10px;flex-wrap:wrap;justify-content:center">';
  html+='<span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(200,90,26,0.3)"></span>常规赛</span>';
  html+='<span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(160,80,220,0.3)"></span>季后赛</span>';
  html+='<span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(255,182,39,0.25);border:2px solid var(--gold)"></span>今天</span>';
  html+='<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#6ecb89"></span>胜/高效</span>';
  html+='<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#f0b84e"></span>轻训</span>';
  html+='<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#ef6f61"></span>负/低效</span>';
  html+='</div>';

  document.getElementById('seasonCalendar').innerHTML=html;
}

function calNav(dir){
  _calViewMonth+=dir;
  // Clamp to season's 3 months (0, 1, 2)
  if(_calViewMonth<0)_calViewMonth=0;
  if(_calViewMonth>2)_calViewMonth=2;
  renderCalendar();
}

function calSwitchSeason(ord){
  _calViewOrdinal=ord;
  _calViewMonth=0;
  renderCalendar();
}

function calGoToday(){
  _calViewOrdinal=G.seasonOrdinal||0;
  // Reset to the month containing today
  const start=new Date(calcSeasonStartDate(_calViewOrdinal)+'T00:00:00');
  const realToday=beijingNow();
  _calViewMonth=realToday.getMonth()-start.getMonth()+(realToday.getFullYear()-start.getFullYear())*12;
  if(_calViewMonth<0)_calViewMonth=0;
  if(_calViewMonth>2)_calViewMonth=2;
  renderCalendar();
}

  if(validArchives.length===0){document.getElementById('archiveCard').style.display='none';return;}

function compressData(obj){
  // Strip history arrays to keep payload small (they're not critical for sync)
  const payload=JSON.parse(JSON.stringify(obj));
  delete payload.history;
  if(payload.archive)payload.archive.forEach(a=>delete a.history);
  const json=JSON.stringify(payload);
  const bytes=new TextEncoder().encode(json);
  let b64=btoa(String.fromCharCode(...bytes));
  return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decompressData(str){
  let b64=str.replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length%4)b64+='=';
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const json=new TextDecoder().decode(bytes);
  return JSON.parse(json);
}

function copySyncCode(){

}
function copySyncUrl(){
  const el=document.getElementById('syncUrl');
  if(el){el.select();document.execCommand('copy');toast('✅ 已复制链接','success');}
}
function syncImportPrompt(){
  const code=prompt('粘贴同步码（从另一台设备复制）：');
  if(!code||!code.trim())return;
  try{
    const data=decompressData(code.trim());
    if(!data.seasonStart||!data.players){throw new Error('invalid');}
    if(!data.history)data.history=[];
    G=data;save();syncSeason();dailyReset();renderAll();
    switchTab('today');
    toast('📱 同步数据已导入！','success');
  }catch(e){
    toast('❌ 同步码无效，请重新复制','error');
  }
}
function checkUrlSync(){
  const params=new URLSearchParams(location.search);
  const syncData=params.get('sync');
  if(!syncData)return;
  try{
    const data=decompressData(syncData);
    if(!data.seasonStart||!data.players)return;
    if(confirm('检测到同步数据，是否导入？（将覆盖本地数据）')){
      if(!data.history)data.history=[];
      G=data;save();syncSeason();dailyReset();renderAll();
      switchTab('today');
      toast('📱 同步数据已导入！','success');
    }
    history.replaceState(null,'',location.pathname);
  }catch(e){/* ignore invalid sync param */}
}

// INIT — sync season to real time on every load
function shouldAdvanceSeason(){
  // Only advance if the NEXT season has actually started
  const nextOrd=(G.seasonOrdinal||0)+1;
  const nextStart=calcSeasonStartDate(nextOrd);
  return new Date(today()+'T00:00:00+08:00')>=new Date(nextStart+'T00:00:00+08:00');
}

function syncSeason(){
  // If current season hasn't started yet, roll back to previous season
  while(rawSeasonDay()<1&&(G.seasonOrdinal||0)>0){
    const prevLabel=seasonLabel(G.seasonOrdinal-1);
    const prevArchive=(G.archive||[]).find(a=>a.season===prevLabel);
    if(prevArchive){
      G.wins=prevArchive.wins||0;G.losses=prevArchive.losses||0;
      G.totalDays=prevArchive.totalDays||0;G.awards=prevArchive.awards||[];
      G.history=prevArchive.history||[];
      if(prevArchive.ratings){Object.entries(prevArchive.ratings).forEach(([id,r])=>{if(G.players[id])G.players[id].rating=r;});}
      G.archive=G.archive.filter(a=>a.season!==prevLabel);
    }
    G.seasonOrdinal--;G.seasonStart=calcSeasonStartDate(G.seasonOrdinal);
    _gameDayCache=null;_gameDayCacheOrd=null;
  }
  // Forward catch-up
  let attempts=0;
  while(rawSeasonDay()>CONST.SEASON_DAYS&&attempts<20){
    if(!shouldAdvanceSeason())break;
    archiveSeason();attempts++;
  }
  const correctOrd=calcInitialOrdinal();
  if((G.seasonOrdinal||0)<correctOrd){
    while((G.seasonOrdinal||0)<correctOrd){
      if(!shouldAdvanceSeason())break;
      archiveSeason();
    }
  }
}
initTheme();
syncSeason();
checkUrlSync();
dailyReset();renderAll();

// Theme: auto / light / dark
function initTheme(){
  const saved=localStorage.getItem('mba_theme')||'auto';
  applyTheme(saved);
}
function applyTheme(mode){
  const root=document.documentElement;
  const btn=document.getElementById('themeBtn');
  let isLight;
  if(mode==='auto'){
    isLight=window.matchMedia('(prefers-color-scheme: light)').matches;
    if(btn)btn.textContent='🔄';
  }else{
    isLight=(mode==='light');
    if(btn)btn.textContent=isLight?'☀️':'🌙';
  }
  root.classList.toggle('light',isLight);
  // Update theme-color meta tag
  const mc=document.querySelector('meta[name="theme-color"]');
  if(mc)mc.content=isLight?'#F0F2F5':'#080A0F';
  // Update status bar style for iOS
  const sb=document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
  if(sb)sb.content=isLight?'default':'black-translucent';
}
function toggleTheme(){
  const modes=['auto','light','dark'];
  const current=localStorage.getItem('mba_theme')||'auto';
  const next=modes[(modes.indexOf(current)+1)%3];
  localStorage.setItem('mba_theme',next);
  applyTheme(next);
}
initTheme();
// Listen for system theme changes when in auto mode
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change',()=>{
  if((localStorage.getItem('mba_theme')||'auto')==='auto')applyTheme('auto');
});
